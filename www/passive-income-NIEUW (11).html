const SPY=365.25*24*3600;
function accBal(a){return parseFloat(a.balance||0)+(a.mutations||[]).reduce(function(s,m){return s+parseFloat(m.amount||0);},0);}
function accYrInc(a){return a.type==='savings'?accBal(a)*parseFloat(a.rate||0)/100:0;}
function assetYrInc(a){
  if(a.category==='stocks'&&a.positions&&a.positions.length>0){
    return a.positions.reduce(function(s,p){return s+parseFloat(p.annualDividend||0);},0);
  }
  return a.incomeMode==='%'?parseFloat(a.value||0)*parseFloat(a.annualReturn||0)/100:parseFloat(a.annualIncome||0);
}
function assetVal(a){
  if(a.category==='stocks'&&a.positions&&a.positions.length>0){
    return a.positions.reduce(function(s,p){return s+parseFloat(p.shares||0)*parseFloat(p.price||0);},0);
  }
  return a.category==='stocks'&&a.shares&&a.pricePerShare?parseFloat(a.shares)*parseFloat(a.pricePerShare):parseFloat(a.value||0);
}
function perSec(){
  var yr=0,ts=S.tickerSources;
  if(ts.savings)S.accounts.filter(function(a){return a.type==='savings';}).forEach(function(a){yr+=toDisp(accYrInc(a),a.currency||'EUR');});
  S.assets.forEach(function(a){var inc=toDisp(assetYrInc(a),a.currency||'EUR'),c=a.category;
    if(c==='stocks'&&a.incomeMode!=='%'&&ts.dividends)yr+=inc;else if(c==='stocks'&&a.incomeMode==='%'&&ts.stocks_appr)yr+=inc;
    else if(c==='realestate'&&a.incomeMode!=='%'&&ts.realestate_rent)yr+=inc;else if(c==='realestate'&&a.incomeMode==='%'&&ts.realestate_appr)yr+=inc;
    else if(c==='sideproject'&&ts.sideproject)yr+=inc;else if(c==='ads'&&ts.ads)yr+=inc;else if(c==='royalties'&&ts.royalties)yr+=inc;
    else if(c==='commodities'&&ts.commodities)yr+=inc;else if(c==='p2p'&&ts.p2p)yr+=inc;else if(c==='other'&&ts.other)yr+=inc;
  });return yr/SPY;
}
function totalYrInc(){return S.accounts.reduce(function(s,a){return s+toDisp(accYrInc(a),a.currency||'EUR');},0)+S.assets.reduce(function(s,a){return s+toDisp(assetYrInc(a),a.currency||'EUR');},0);}

function netWorth(){return S.accounts.reduce(function(s,a){return s+toDisp(accBal(a),a.currency||'EUR');},0)+S.assets.reduce(function(s,a){return s+toDisp(assetVal(a),a.currency||'EUR');},0);}
function timerE(tm,ps){return tm.paused?ps*(tm.elapsed||0)/1000:ps*((tm.elapsed||0)+(S.now-tm.startedAt))/1000;}
function timerElapsed(tm){return tm.paused?tm.elapsed||0:(tm.elapsed||0)+(S.now-tm.startedAt);}
function fmtTime(ms){var s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return h>0?h+'u '+m+'m':m>0?m+'m '+sc+'s':sc+'s';}
function fmt(n,d){d=d||2;return n.toLocaleString('nl-NL',{minimumFractionDigits:d,maximumFractionDigits:d});}
function currSym(c){return(CURRENCIES[c]||CURRENCIES.EUR).symbol;}
function fmtC(n,c,d){return currSym(c||'EUR')+fmt(Math.abs(n),d||2);}
function toDisp(a,f){if(S.displayCurrency===f)return a;var r=S.rates;if(!r||!r.USD)return a;var e=f==='EUR'?a:a/(r[f]||1);return S.displayCurrency==='EUR'?e:e*(r[S.displayCurrency]||1);}

// ═══════════ ADD POSITION FORM (with Finnhub search) ═══════════
function buildAddPositionForm(){
  var a=S.viewPortfolio,el=document.createElement('div');
  el.innerHTML='<div class="modal-title">'+t('addPosition')+'</div><div class="search-input-wrap"><div class="field"><label>'+t('searchTicker')+'</label><input id="tickerSearch" type="text" placeholder="'+t('searchTicker')+'" value="'+(S.form.searchQuery||'')+'"></div><div id="searchResults"></div></div><div class="field"><label>'+t('symbol')+'</label><input id="posSymbol" type="text" value="'+(S.form.posSymbol||'')+'" style="text-transform:uppercase"></div><div class="field"><label>'+t('name')+'</label><input id="posName" type="text" value="'+(S.form.posName||'')+'"></div><div class="field"><label>'+t('shares')+'</label><input id="posShares" type="number" inputmode="decimal" value="'+(S.form.posShares||'')+'"></div><div class="field"><label>'+t('pricePerShare')+'</label><input id="posPrice" type="number" inputmode="decimal" value="'+(S.form.posPrice||'')+'"></div><div class="field"><label>'+t('dividendAmt')+'</label><input id="posDividend" type="number" inputmode="decimal" placeholder="0" value="'+(S.form.posDividend||'')+'"></div>'+(S.form.err?'<div class="err-msg">'+S.form.err+'</div>':'')+'<div class="btn-row"><button class="btn-sec" id="pCanBtn">'+t('cancel')+'</button><button class="btn-primary" id="pSavBtn">'+t('save')+'</button></div>';
  setTimeout(function(){
    var searchTimeout=null;
    var searchInput=el.querySelector('#tickerSearch');
    if(searchInput)searchInput.oninput=function(){
      clearTimeout(searchTimeout);
      var q=searchInput.value.trim();
      if(q.length<2){document.getElementById('searchResults').innerHTML='';return;}
      searchTimeout=setTimeout(async function(){
        var resultsDiv=document.getElementById('searchResults');
        resultsDiv.innerHTML='<div class="search-loading">Searching...</div>';
        var results=await finnhubSearch(q);
        if(results.length===0){resultsDiv.innerHTML='<div class="search-loading">No results</div>';setTimeout(function(){resultsDiv.innerHTML='';},2000);return;}
        resultsDiv.innerHTML='<div class="search-results">'+results.map(function(r){return '<div class="search-result-item" data-sym="'+r.symbol+'" data-name="'+(r.description||r.symbol)+'"><strong>'+r.symbol+'</strong><div class="search-result-sub">'+(r.description||'')+' · '+r.type+'</div></div>';}).join('')+'</div>';
        resultsDiv.querySelectorAll('.search-result-item').forEach(function(item){
          item.onclick=async function(){
            var sym=item.dataset.sym,name=item.dataset.name;
            el.querySelector('#posSymbol').value=sym;
            el.querySelector('#posName').value=name;
            resultsDiv.innerHTML='<div class="search-loading">Loading price...</div>';
            var quote=await finnhubQuote(sym);
            if(quote&&quote.c>0){el.querySelector('#posPrice').value=quote.c.toFixed(2);}
            resultsDiv.innerHTML='';
          };
        });
      },400);
    };
    el.querySelector('#pCanBtn').onclick=function(){S.modal=null;S.form={};render();};
    el.querySelector('#pSavBtn').onclick=function(){
      var symbol=el.querySelector('#posSymbol').value.trim().toUpperCase();
      var name=el.querySelector('#posName').value.trim()||symbol;
      var shares=parseFloat(el.querySelector('#posShares').value);
      var price=parseFloat(el.querySelector('#posPrice').value);
      var dividend=parseFloat(el.querySelector('#posDividend').value)||0;
      if(!symbol||isNaN(shares)||shares<=0){S.form.err=t('nameReq');render();return;}
      var ai=S.assets.findIndex(function(x){return x.id===a.id;});
      if(!S.assets[ai].positions)S.assets[ai].positions=[];
      S.assets[ai].positions.push({id:''+Date.now(),symbol:symbol,name:name,shares:shares,price:price||0,annualDividend:dividend,addedDate:new Date().toISOString().split('T')[0]});
      S.viewPortfolio=S.assets[ai];S.modal=null;S.form={};persist();render();
    };
  },10);
  return el;
}

{var ti=S.accounts.findIndex(function(a){return a.id===toId;});if(!S.accounts[ti].mutations)S.accounts[ti].mutations=[];S.accounts[ti].mutations.push({id:''+(Date.now()+1),date:date,amount:amt,description:'Transfer from '+from.name});}else{var ti=S.assets.findIndex(function(a){return a.id===toId;});S.assets[ti].value=''+(parseFloat(S.assets[ti].value||0)+amt);}S.transactions.push({id:''+(Date.now()+2),date:date,type:'transfer',amount:amt,description:from.name+' → '+toName});S.modal=null;S.form={};S.editAcc=null;persist();render();};},10);return el;}

  setTimeout(function(){
    el.querySelector('#amInc').onclick=function(){S.form.mutDir='increase';render();};
    el.querySelector('#amDec').onclick=function(){S.form.mutDir='decrease';render();};
    el.querySelector('#amCan').onclick=function(){S.modal='viewAssetMutations';S.form={};render();};
    el.querySelector('#amSav').onclick=function(){
      var raw=parseFloat(el.querySelector('#amAmt').value);if(!raw){S.form.err=t('mutErrFill');render();return;}
      var sign=isDec?-1:1,date=el.querySelector('#amDt').value;
      var i=S.assets.findIndex(function(a){return a.id===asset.id;});
      if(!S.assets[i].mutations)S.assets[i].mutations=[];
      S.assets[i].mutations.push({id:''+Date.now(),date:date,amount:raw*sign,description:isDec?t('decrease'):t('increase')});
      // Update value
      S.assets[i].value=''+(parseFloat(S.assets[i].value||0)+raw*sign);
      S.transactions.push({id:''+(Date.now()+1),date:date,type:isDec?'withdrawal':'deposit',amount:raw*sign,description:asset.name+': '+(isDec?'-':'+')+fmtC(raw,asset.currency||'EUR',2)});
      S.editAcc=S.assets[i];S.modal='viewAssetMutations';S.form={};persist();render();
    };
  },10);return el;
}

// ═══════════ SETTINGS TAB ═══════════
function buildSettingsTab(){var el=document.createElement('div');el.className='settings-page fade';var pg=S.settingsPage,u=auth.currentUser;function sRow(icon,label,rightHTML,onClick){var row=document.createElement('button');row.style.cssText='display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:none;border-bottom:1px solid var(--brd);padding:16px 4px;cursor:pointer;color:var(--txt)';row.innerHTML='<div style="display:flex;align-items:center;gap:12px"><span style="font-size:20px;width:32px;text-align:center">'+icon+'</span><span style="font-size:13px">'+label+'</span></div><div style="display:flex;align-items:center;gap:8px">'+rightHTML+'<span style="font-size:14px;color:var(--muted)">›</span></div>';row.onclick=onClick;return row;}
  if(pg==='lang'){el.innerHTML='<div class="settings-header"><button class="settings-back" id="sB">←</button><div class="settings-title">'+t('chooseLanguage')+'</div></div>';var list=document.createElement('div');list.className='settings-list';Object.entries(LANGS).forEach(function(e){var opt=document.createElement('button');opt.className='settings-option'+(S.lang===e[0]?' active':'');opt.innerHTML='<span class="settings-option-flag">'+e[1].flag+'</span><div class="settings-option-text"><div class="settings-option-name">'+e[1].name+'</div></div><span class="settings-option-check">✓</span>';opt.onclick=function(){S.lang=e[0];persist();render();};list.appendChild(opt);});el.appendChild(list);setTimeout(function(){el.querySelector('#sB').onclick=function(){S.settingsPage=null;render();};},10);return el;}
  if(pg==='currency'){el.innerHTML='<div class="settings-header"><button class="settings-back" id="sB">←</button><div class="settings-title">'+t('chooseCurrency')+'</div></div>';var list=document.createElement('div');list.className='settings-list';DISP_CURRENCIES.forEach(function(code){var c=CURRENCIES[code];var opt=document.createElement('button');opt.className='settings-option'+(S.displayCurrency===code?' active':'');opt.innerHTML='<span class="settings-option-flag">'+c.symbol+'</span><div class="settings-option-text"><div class="settings-option-name">'+c.name+'</div><div class="settings-option-sub">'+code+'</div></div><span class="settings-option-check">✓</span>';opt.onclick=function(){S.displayCurrency=code;persist();render();};list.appendChild(opt);});el.appendChild(list);setTimeout(function(){el.querySelector('#sB').onclick=function(){S.settingsPage=null;render();};},10);return el;}
  if(pg==='theme'){el.innerHTML='<div class="settings-header"><button class="settings-back" id="sB">←</button><div class="settings-title">'+t('chooseTheme')+'</div></div>';var list=document.createElement('div');list.className='settings-list';[['dark','🌙','Dark',''],['light','☀️','Light',''],['auto','🔄','Auto','6:00–20:00 Light / 20:00–6:00 Dark']].forEach(function(e){var opt=document.createElement('button');opt.className='settings-option'+(S.theme===e[0]?' active':'');opt.innerHTML='<span class="settings-option-flag">'+e[1]+'</span><div class="settings-option-text"><div class="settings-option-name">'+e[2]+'</div>'+(e[3]?'<div class="settings-option-sub">'+e[3]+'</div>':'')+'</div><span class="settings-option-check">✓</span>';opt.onclick=function(){S.theme=e[0];applyTheme();persist();render();};list.appendChild(opt);});el.appendChild(list);setTimeout(function(){el.querySelector('#sB').onclick=function(){S.settingsPage=null;render();};},10);return el;}
  if(pg==='account'){el.innerHTML='<div class="settings-header"><button class="settings-back" id="sB">←</button><div class="settings-title">'+t('settingsAccount')+'</div></div>';if(u){el.innerHTML+='<div style="text-align:center;padding:20px 0"><div style="width:48px;height:48px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;font-family:var(--serif);color:var(--bg);margin:0 auto 8px">'+(u.email||'?')[0].toUpperCase()+'</div><div style="font-size:13px;color:var(--txt)">'+u.email+'</div></div>';var lb=document.createElement('button');lb.className='btn-sec';lb.style.cssText='width:100%;margin-bottom:12px';lb.textContent=t('logout');lb.onclick=function(){auth.signOut();S.authScreen='login';S.settingsPage=null;render();};el.appendChild(lb);}else{el.innerHTML+='<div style="text-align:center;padding:20px;color:var(--muted)">'+t('skipLogin')+'</div>';var lb=document.createElement('button');lb.className='btn-primary';lb.style.cssText='width:100%';lb.textContent=t('signIn');lb.onclick=function(){S.authScreen='login';S.settingsPage=null;render();};el.appendChild(lb);}setTimeout(function(){el.querySelector('#sB').onclick=function(){S.settingsPage=null;render();};},10);return el;}
  el.innerHTML='<div class="settings-header"><div class="settings-title">'+t('settings')+'</div></div>';var accSec=document.createElement('div');accSec.className='settings-group';accSec.innerHTML='<div class="settings-group-label">'+t('settingsAccount')+'</div>';var accBox=document.createElement('div');accBox.style.cssText='background:var(--surf);border:1px solid var(--brd);border-radius:16px;padding:0 12px;overflow:hidden';var ar=sRow(u?'🟢':'🔵',u?u.email:t('skipLogin'),'<span style="font-size:12px;color:var(--muted)">'+(u?t('loggedInAs'):'')+'</span>',function(){S.settingsPage='account';render();});ar.style.borderBottom='none';accBox.appendChild(ar);accSec.appendChild(accBox);el.appendChild(accSec);var prefSec=document.createElement('div');prefSec.className='settings-group';prefSec.innerHTML='<div class="settings-group-label">Preferences</div>';var prefBox=document.createElement('div');prefBox.style.cssText='background:var(--surf);border:1px solid var(--brd);border-radius:16px;padding:0 12px;overflow:hidden';var lg=LANGS[S.lang],cur=CURRENCIES[S.displayCurrency]||CURRENCIES.EUR;prefBox.appendChild(sRow('🌐',t('settingsLang'),'<span style="font-size:12px;color:var(--muted)">'+lg.flag+' '+lg.name+'</span>',function(){S.settingsPage='lang';render();}));prefBox.appendChild(sRow('💱',t('settingsCurrency'),'<span style="font-size:12px;color:var(--muted)">'+cur.symbol+' '+cur.name+'</span>',function(){S.settingsPage='currency';render();}));var thLabel=S.theme==='auto'?'🔄 Auto':S.theme==='light'?'☀️ Light':'🌙 Dark';var tr=sRow('🎨',t('settingsTheme'),'<span style="font-size:12px;color:var(--muted)">'+thLabel+'</span>',function(){S.settingsPage='theme';render();});tr.style.borderBottom='none';prefBox.appendChild(tr);prefSec.appendChild(prefBox);el.appendChild(prefSec);var pw=document.createElement('div');pw.className='powered';pw.textContent=t('powered');el.appendChild(pw);return el;}

document.addEventListener('DOMContentLoaded',function(){applyTheme();auth.onAuthStateChanged(function(user){if(user){S.authUser=user;S.authScreen='app';loadFromCloud().then(function(){render();});}else if(localStorage.getItem('pi_skipped_auth')){S.authScreen='app';render();}else{S.authScreen='login';render();}});fetchRates();initAdMob();});
</script>
