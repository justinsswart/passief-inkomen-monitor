<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Passief Inkomen</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#0d0d14;--surf:#13131e;--surf2:#1a1a2a;--brd:rgba(255,255,255,.07);
  --gold:#c9a84c;--gold2:#e8c97a;--txt:#f0ede8;--muted:rgba(240,237,232,.45);
  --grn:#4ecb8d;--blu:#5b9cf6;--red:#ff6b6b;
  --mono:'DM Mono',monospace;--serif:'Playfair Display',serif;
  --ad-h:50px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--mono);-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:var(--mono);touch-action:manipulation;cursor:pointer;-webkit-tap-highlight-color:transparent}
input,select{font-family:var(--mono);touch-action:manipulation}

#app{max-width:430px;margin:0 auto;height:100%;display:flex;flex-direction:column;position:relative;padding-top:env(safe-area-inset-top,28px)}

/* Lang */
.lang-pill{background:var(--hover);border:1px solid var(--brd);color:var(--muted);border-radius:20px;padding:5px 11px;font-size:10px;display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0;border:1px solid var(--brd)}
.lang-slide-wrap{position:absolute;top:52px;right:16px;z-index:200;transform-origin:top right;animation:popIn .18s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.lang-menu-box{background:var(--surf2);border:1px solid var(--brd);border-radius:16px;padding:8px;display:flex;flex-direction:column;gap:3px;min-width:160px;max-height:260px;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;box-shadow:0 16px 40px rgba(0,0,0,.5)}
.lang-btn{width:100%;padding:8px 12px;border-radius:10px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:9px;background:none;border:none;text-align:left}
.lang-btn.active{background:rgba(201,168,76,.12);color:var(--gold)}
.lang-btn .flag{font-size:16px}

/* Header */
.header{padding:14px 16px 14px;border-bottom:1px solid var(--brd);background:var(--surf);flex-shrink:0;position:relative}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.app-label{font-size:9px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;opacity:.7}
.total-bal{font-size:30px;font-family:var(--serif);letter-spacing:-.5px;line-height:1}
.header-sub{font-size:9px;color:var(--muted);margin-top:4px;letter-spacing:1.5px;text-transform:uppercase}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;position:relative}
.chips{display:flex;gap:7px;margin-top:14px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{background:var(--hover);border:1px solid var(--brd);border-radius:20px;padding:7px 14px;white-space:nowrap;flex-shrink:0}
.chip-label{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px}
.chip-val{font-size:13px;color:var(--txt)}

/* Tabbar */
.tabbar{display:flex;background:var(--surf);border-top:1px solid var(--brd);padding-bottom:calc(env(safe-area-inset-bottom,0px) + var(--ad-h) + 8px);flex-shrink:0}
.tab{flex:1;padding:12px 4px 10px;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;border:none;background:none;transition:color .2s}
.tab.active{color:var(--gold)}
.tab-icon{font-size:19px;line-height:1}

/* Screen */
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:20px;scrollbar-width:none}
.screen::-webkit-scrollbar{display:none}

/* Live */
.live-card{margin:18px 16px 0;background:var(--surf);border:1px solid var(--brd);border-radius:24px;padding:24px;position:relative;overflow:hidden}
.live-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 0%,rgba(201,168,76,.05) 0%,transparent 65%);pointer-events:none}
.live-badge{font-size:9px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.live-dot{width:6px;height:6px;background:var(--grn);border-radius:50%;flex-shrink:0;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.live-rate-num{font-size:40px;font-family:var(--serif);color:var(--gold2);letter-spacing:-.5px;line-height:1;margin-bottom:4px}
.live-rate-unit{font-size:11px;color:var(--muted);margin-bottom:20px}
.live-today-row{display:flex;justify-content:space-between;align-items:center;padding-top:18px;border-top:1px solid var(--brd)}
.live-today-label{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px}
.live-today-val{font-size:20px;color:var(--grn);font-family:var(--serif)}
.expand-btn{width:100%;margin-top:16px;padding:12px;background:var(--btn-bg);border:1px solid var(--brd);border-radius:14px;color:var(--muted);font-size:11px;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:1px}

/* Timers */
.timers-wrap{padding:16px 16px 0;animation:fadeIn .2s ease}
.section-hd{font-size:9px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:12px}
.timer-card{background:var(--surf);border:1px solid var(--brd);border-radius:16px;padding:15px 16px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center}
.timer-name{font-size:13px;color:var(--txt);margin-bottom:3px}
.timer-elapsed{font-size:11px;color:var(--muted)}
.timer-right{text-align:right}
.timer-earned{font-size:16px;color:var(--grn);font-family:var(--serif)}
.timer-del{background:none;border:none;color:var(--red);font-size:22px;line-height:1;padding:4px 8px;opacity:.7}.timer-del:hover{opacity:1}
.add-timer-btn{width:100%;padding:13px;background:var(--overlay);border:1px dashed var(--brd);border-radius:16px;color:var(--muted);font-size:12px}

/* Accounts */
.acc-list{padding:16px}
.acc-item{background:var(--surf);border:1px solid var(--brd);border-radius:20px;margin-bottom:12px;overflow:hidden}
.acc-row{display:flex;align-items:center;gap:12px;padding:16px 18px;cursor:pointer;user-select:none}
.acc-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.acc-row-info{flex:1;min-width:0}
.acc-name{font-size:14px;color:var(--txt);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.acc-meta{font-size:10px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase}
.acc-bal{font-size:18px;font-family:var(--serif);flex-shrink:0}
.acc-chevron{font-size:10px;color:var(--muted);flex-shrink:0;transition:transform .2s}
.acc-chevron.open{transform:rotate(180deg)}
.acc-expand{display:none;border-top:1px solid var(--brd)}
.acc-expand.open{display:block}
.acc-stats{display:flex;gap:8px;padding:14px 14px 0}
.acc-stat{flex:1;background:var(--overlay);border-radius:11px;padding:9px 11px}
.acc-stat-label{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.acc-stat-val{font-size:13px}
.acc-act-row{display:flex;border-top:1px solid var(--brd);margin-top:14px}
.acc-act-row button{flex:1;padding:11px 4px;background:none;border:none;border-right:1px solid var(--brd);font-size:10px;font-family:var(--mono);display:flex;align-items:center;justify-content:center;gap:3px;cursor:pointer;line-height:1.3}
.acc-act-row button:last-child{border-right:none}

/* FAB */
.fab{position:fixed;bottom:calc(var(--ad-h) + 70px + env(safe-area-inset-bottom,0px));right:max(calc(50vw - 215px + 16px),16px);width:52px;height:52px;background:var(--gold);border:none;border-radius:50%;color:#0c0c14;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(201,168,76,.4);z-index:50}

/* Analytics */
.analytics{padding:16px}
.chart-card{background:var(--surf);border:1px solid var(--brd);border-radius:20px;padding:20px;margin-bottom:12px}
.chart-title{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-label{font-size:11px;color:var(--muted);width:70px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:7px;background:var(--btn-bg);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.bar-val{font-size:11px;width:64px;text-align:right;flex-shrink:0}
.stats-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat-block{background:var(--surf2);border-radius:14px;padding:16px;text-align:center}
.stat-block-label{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.stat-block-val{font-size:20px;font-family:var(--serif)}
.donut-wrap{display:flex;align-items:center;gap:20px;margin-bottom:4px}
.donut-center{position:relative;flex-shrink:0;width:136px;height:136px}
.donut-center-txt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.donut-center-val{font-size:15px;font-family:var(--serif);color:var(--txt);line-height:1}
.donut-center-lbl{font-size:8px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px}
.donut-legend{flex:1;display:flex;flex-direction:column;gap:10px}
.legend-item{display:flex;align-items:center;gap:10px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-label{font-size:11px;color:var(--muted);margin-bottom:2px}
.legend-val{font-size:13px;color:var(--txt)}
.legend-pct{font-size:10px;color:var(--muted)}
.chart-svg-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chart-svg-wrap::-webkit-scrollbar{display:none}

/* Modal */
.modal-overlay{position:fixed;inset:0 0 calc(var(--ad-h) + env(safe-area-inset-bottom,0px)) 0;background:rgba(0,0,0,.72);z-index:300;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--surf);border-radius:28px 28px 0 0;padding:28px 24px max(28px,env(safe-area-inset-bottom,28px));width:100%;max-width:430px;max-height:88vh;overflow-y:auto;animation:slideUp .28s cubic-bezier(.32,1.12,.72,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:17px;font-family:var(--serif);margin-bottom:22px}
.field{margin-bottom:15px}
.field label{display:block;font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px}
.field input,.field select{width:100%;background:var(--surf2);border:1px solid var(--brd);border-radius:12px;padding:12px 14px;color:var(--txt);font-size:14px;outline:none}
.field input:focus,.field select:focus{border-color:var(--gold)}
.field select option{background:var(--surf2)}
.btn-row{display:flex;gap:9px;margin-top:6px}
.btn-primary{flex:1;padding:14px;background:var(--gold);color:#0c0c14;border:none;border-radius:13px;font-size:13px;font-weight:500}
.btn-sec{padding:14px 18px;background:var(--hover);color:var(--muted);border:1px solid var(--brd);border-radius:13px;font-size:13px}
.btn-danger{color:var(--red)!important;border-color:rgba(255,107,107,.25)!important}
.type-btns{display:flex;gap:8px}
.type-btn{flex:1;padding:11px;background:var(--overlay);border:1px solid var(--brd);border-radius:11px;color:var(--muted);font-size:12px;text-align:center}
.type-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08)}
.err-msg{color:var(--red);font-size:12px;margin-bottom:12px}

/* Tutorial */
.tutorial-wrap{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top,28px);animation:fadeIn .3s ease}
.tutorial-inner{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px 28px max(32px,env(safe-area-inset-bottom,32px));max-width:430px;margin:0 auto;width:100%}
.tutorial-dots{display:flex;gap:6px;margin-bottom:20px}
.tutorial-dot{width:6px;height:6px;border-radius:3px;background:var(--brd);transition:all .3s}
.tutorial-dot.active{width:22px;background:var(--gold)}
.tutorial-visual{width:100%;max-width:320px;margin:0 auto;flex:1;display:flex;flex-direction:column;justify-content:center;gap:10px}
.tutorial-txt{text-align:center;margin-top:24px}
.tutorial-title{font-size:22px;font-family:var(--serif);color:var(--txt);margin-bottom:10px;line-height:1.2}
.tutorial-desc{font-size:13px;color:var(--muted);line-height:1.7}
.tutorial-nav{width:100%;display:flex;flex-direction:column;gap:10px;margin-top:28px}
.tutorial-next{width:100%;padding:16px;background:var(--gold);color:#0c0c14;border:none;border-radius:16px;font-size:14px;font-weight:500;font-family:var(--mono);cursor:pointer}
.tutorial-skip{width:100%;padding:10px;background:none;border:none;color:rgba(240,237,232,.25);font-size:12px;font-family:var(--mono);cursor:pointer}
.t-card{background:var(--surf);border:1px solid var(--brd);border-radius:16px;padding:14px 16px}
.t-mini-label{font-size:8px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px}
.t-mini-val{font-size:13px;font-family:var(--serif)}
.t-stat{flex:1;background:var(--surf2);border-radius:9px;padding:8px 10px;text-align:center}

/* Empty / misc */
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:.5}
.empty-txt{font-size:14px}
.empty-sub{font-size:11px;margin-top:6px;color:rgba(240,237,232,.2)}
.powered{text-align:center;font-size:9px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;padding:18px 0 4px;opacity:.7}
.logout-btn{background:var(--hover);border:1px solid var(--brd);color:var(--muted);border-radius:16px;padding:5px 10px;font-size:10px}
.fade{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* Item cards (shared for accounts+assets) */
.item-card{width:100%;text-align:left;background:var(--surf);border:1px solid var(--brd);border-radius:20px;padding:18px;margin-bottom:12px;display:block;cursor:pointer}
.item-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.item-id{display:flex;gap:10px;align-items:flex-start}
.item-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.item-name{font-size:14px;color:var(--txt);margin-bottom:2px}
.item-meta{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.item-bal{font-size:20px;font-family:var(--serif)}
.item-stats{display:flex;gap:8px}
.item-stat{flex:1;background:var(--overlay);border-radius:11px;padding:8px 10px}
.item-stat-label{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px}
.item-stat-val{font-size:12px}
.item-actions{display:flex;gap:0;border:1px solid var(--brd);border-top:none;border-radius:0 0 20px 20px;overflow:hidden;margin-top:-12px;margin-bottom:14px}
.item-action-btn{flex:1;padding:10px 8px;background:var(--overlay);border:none;border-right:1px solid var(--brd);color:var(--muted);font-size:11px;font-family:var(--mono);display:flex;align-items:center;justify-content:center;gap:5px;cursor:pointer}
.item-action-btn:last-child{border-right:none}
/* Color picker */
.color-pick-row{display:flex;gap:8px;flex-wrap:wrap}
.color-dot{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:border-color .15s}
.color-dot.active{border-color:var(--txt);box-shadow:0 0 0 2px var(--bg)}
/* Ticker source toggles */
.ticker-toggle{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--surf);border:1px solid var(--brd);border-radius:14px;margin-bottom:8px}
.ticker-toggle-left{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--txt)}
.ticker-toggle-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.toggle-switch{width:42px;height:24px;border-radius:12px;background:var(--btn-bg);border:1px solid var(--brd);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle-switch.on{background:var(--gold)}
.toggle-knob{width:18px;height:18px;border-radius:50%;background:var(--txt);position:absolute;top:2px;left:2px;transition:transform .2s}
.toggle-switch.on .toggle-knob{transform:translateX(18px)}
/* Transactions */
.tx-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surf);border:1px solid var(--brd);border-radius:14px;margin-bottom:8px}
.tx-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tx-detail{flex:1;overflow:hidden}
.tx-name{font-size:12px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-date{font-size:10px;color:var(--muted)}
.tx-amount{font-size:14px;font-family:var(--serif);text-align:right;flex-shrink:0}
/* Auth */
.auth-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:40px 24px;text-align:center}
.auth-logo{font-size:48px;margin-bottom:8px}
.auth-title{font-family:var(--serif);font-size:26px;margin-bottom:4px;color:var(--gold2)}
.auth-sub{font-size:11px;color:var(--muted);margin-bottom:32px;letter-spacing:1.5px}
.auth-form{width:100%;max-width:340px}
.auth-field{margin-bottom:14px;text-align:left}
.auth-field label{display:block;font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.auth-field input{width:100%;background:var(--btn-bg);border:1px solid var(--brd);border-radius:14px;padding:14px 16px;color:var(--txt);font-size:14px;outline:none;font-family:var(--mono)}
.auth-field input:focus{border-color:var(--gold)}
.auth-btn{width:100%;padding:16px;background:var(--gold);color:var(--bg);border:none;border-radius:14px;font-size:14px;font-weight:500;font-family:var(--mono);margin-top:6px}
.auth-btn:disabled{opacity:.5}
.auth-switch{margin-top:20px;font-size:12px;color:var(--muted)}
.auth-switch button{background:none;border:none;color:var(--gold);font-size:12px;font-family:var(--mono);text-decoration:underline;cursor:pointer}
.auth-forgot{margin-top:10px}
.auth-forgot button{background:none;border:none;color:var(--muted);font-size:11px;font-family:var(--mono);cursor:pointer}
.auth-err{color:var(--red);font-size:12px;margin-bottom:12px}
.auth-success{color:var(--grn);font-size:12px;margin-bottom:12px}
.auth-divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:10px;letter-spacing:1.5px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--brd)}
.auth-skip{background:none;border:1px solid var(--brd);color:var(--muted);border-radius:14px;padding:12px;width:100%;font-size:12px;font-family:var(--mono);cursor:pointer;margin-top:4px}
/* Settings */
.settings-page{padding:0 16px 20px}
.settings-header{padding:20px 0 16px;display:flex;align-items:center;gap:12px}
.settings-back{background:none;border:none;color:var(--muted);font-size:20px;padding:4px 8px;cursor:pointer;line-height:1}
.settings-title{font-family:var(--serif);font-size:20px;color:var(--txt)}
.settings-group{margin-bottom:20px}
.settings-group-label{font-size:9px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:10px;padding:0 4px}
.settings-list{display:flex;flex-direction:column;gap:6px}
.settings-option{display:flex;align-items:center;gap:14px;background:var(--surf);border:1px solid var(--brd);border-radius:16px;padding:14px 16px;cursor:pointer;transition:all .15s;width:100%}
.settings-option.active{border-color:var(--gold)}
.settings-option-flag{font-size:22px;width:32px;text-align:center;flex-shrink:0}
.settings-option-text{flex:1;text-align:left}
.settings-option-name{font-size:13px;color:var(--txt)}
.settings-option-sub{font-size:10px;color:var(--muted);margin-top:2px}
.settings-option-check{font-size:16px;color:var(--gold);opacity:0;transition:opacity .15s}
.settings-option.active .settings-option-check{opacity:1}
.gear-btn{background:var(--btn-bg);border:1px solid var(--brd);color:var(--muted);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;cursor:pointer}
/* Portfolio */
.portfolio-position{display:flex;align-items:center;gap:12px;padding:14px;background:var(--surf);border:1px solid var(--brd);border-radius:16px;margin-bottom:8px;cursor:pointer}
.pos-info{flex:1;overflow:hidden}
.pos-symbol{font-size:13px;color:var(--txt);font-weight:500}
.pos-name{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pos-right{text-align:right;flex-shrink:0}
.pos-value{font-size:14px;font-family:var(--serif);color:var(--txt)}
.pos-shares{font-size:10px;color:var(--muted)}
/* Search */
.search-input-wrap{position:relative;margin-bottom:12px}
.search-results{position:absolute;top:100%;left:0;right:0;background:var(--surf);border:1px solid var(--brd);border-radius:12px;max-height:200px;overflow-y:auto;z-index:10;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.search-result-item{padding:10px 14px;border-bottom:1px solid var(--brd);cursor:pointer;font-size:12px;color:var(--txt)}
.search-result-item:last-child{border-bottom:none}
.search-result-sub{font-size:10px;color:var(--muted);margin-top:2px}
</style>

const SPY=365.25*24*3600;
// Haal huidig saldo op (inclusief mutaties)
function accBal(a){
  const muts=a.mutations||[];
  return parseFloat(a.balance||0)+muts.reduce((s,m)=>s+parseFloat(m.inleg||m.amount||0),0);
}
// Haal huidig dividend op: initieel + alle extra mutatie-dividenden opgeteld
function accDiv(a){
  const muts=a.mutations||[];
  return parseFloat(a.dividend||0)+muts.reduce((s,m)=>s+parseFloat(m.dividend||0),0);
}
// Yearly income for an account
function accYrInc(a){
  if(a.type==='current')return 0;
  if(a.type==='savings')return accBal(a)*parseFloat(a.rate||0)/100;
  return accDiv(a);
}
// Asset value
function assetVal(a){
  if(a.category==='stocks'&&a.positions){return a.positions.reduce((s,p)=>s+parseFloat(p.shares||0)*parseFloat(p.price||0),0);}
  return parseFloat(a.value||0);
}
// Asset yearly income
function assetYrInc(a){
  if(a.incomeMode==='%')return assetVal(a)*parseFloat(a.annualReturn||0)/100;
  return parseFloat(a.annualIncome||0);
}
// Net worth (all accounts + all assets)
function netWorth(){
  return S.accounts.reduce((s,a)=>s+toDisp(accBal(a),a.currency||'EUR'),0)
    +S.assets.reduce((s,a)=>s+toDisp(assetVal(a),a.currency||'EUR'),0);
}
// Total yearly income (all sources)
function totalYrInc(){
  return S.accounts.reduce((s,a)=>s+toDisp(accYrInc(a),a.currency||'EUR'),0)
    +S.assets.reduce((s,a)=>s+toDisp(assetYrInc(a),a.currency||'EUR'),0);
}
function perSec(){
  // Use ticker sources to determine what counts
  let total=0;
  S.accounts.forEach(a=>{
    if(a.type==='savings'&&S.tickerSources.savings)total+=toDisp(accYrInc(a)/SPY,a.currency||'EUR');
    else if(a.type==='investment'&&S.tickerSources.dividends)total+=toDisp(accDiv(a)/SPY,a.currency||'EUR');
  });
  S.assets.forEach(a=>{
    const key=a.category;
    if(S.tickerSources[key])total+=toDisp(assetYrInc(a)/SPY,a.currency||'EUR');
  });
  return total;
}
function todayE(ps){const n=new Date(),mid=new Date(n.getFullYear(),n.getMonth(),n.getDate());return ps*(n-mid)/1000;}
function timerE(tm,ps){
  if(tm.paused) return ps*(tm.elapsed||0)/1000;
  return ps*((tm.elapsed||0)+(S.now-tm.startedAt))/1000;
}
function timerElapsed(tm){
  if(tm.paused) return tm.elapsed||0;
  return (tm.elapsed||0)+(S.now-tm.startedAt);
}
function totalBal(){return netWorth();}
function yearlyInc(){return totalYrInc();}
function totalEarned(){
  const now=Date.now(),msPerYear=365.25*24*3600*1000;
  let total=0;
  S.accounts.forEach(a=>{
    const sd=a.startDate?new Date(a.startDate).getTime():new Date(new Date().getFullYear(),0,1).getTime();
    const years=Math.max(0,(now-sd)/msPerYear);
    total+=toDisp(accYrInc(a)*years,a.currency||'EUR');
  });
  S.assets.forEach(a=>{
    const sd=a.startDate?new Date(a.startDate).getTime():new Date(new Date().getFullYear(),0,1).getTime();
    const years=Math.max(0,(now-sd)/msPerYear);
    total+=toDisp(assetYrInc(a)*years,a.currency||'EUR');
  });
  return total;
}
function ytdE(){const n=new Date(),j=new Date(n.getFullYear(),0,1);return perSec()*(n-j)/1000;}
function fmtTime(ms){const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;if(h>0)return `${h}u ${m}m`;if(m>0)return `${m}m ${sc}s`;return `${sc}s`;}
function fmt(n,d=2){return n.toLocaleString('nl-NL',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtE(n,d=2){return '€'+fmt(Math.abs(n),d);}
function currSym(code){return (CURRENCIES[code]||CURRENCIES.EUR).symbol;}
function fmtC(n,code='EUR',d=2){return currSym(code)+fmt(Math.abs(n),d);}
// Convert amount from account currency to display currency
function toDisp(amount,fromCur='EUR'){
  if(S.displayCurrency===fromCur)return amount;
  const r=S.rates;
  if(!r||Object.keys(r).length<=1){return amount;} // rates not loaded yet, show original
  const inEUR=fromCur==='EUR'?amount:(amount/(r[fromCur]||1));
  return S.displayCurrency==='EUR'?inEUR:inEUR*(r[S.displayCurrency]||1);
}
function fmtD(n,fromCur='EUR',d=2){return fmtC(toDisp(n,fromCur),S.displayCurrency,d);}
function cycleCurrency(){
  const idx=DISP_CURRENCIES.indexOf(S.displayCurrency);
  S.displayCurrency=DISP_CURRENCIES[(idx+1)%DISP_CURRENCIES.length];
  persist();render();
}

const RATE_CACHE_KEY='pi_rates_v2';
const RATE_TS_KEY='pi_rates_ts';
const RATE_TTL=3600000; // 1 hour cache

function loadCachedRates(){
  try{
    const ts=parseInt(localStorage.getItem(RATE_TS_KEY)||'0');
    const cached=JSON.parse(localStorage.getItem(RATE_CACHE_KEY)||'null');
    if(cached&&Date.now()-ts<RATE_TTL){S.rates=cached;return true;}
  }catch(e){}
  return false;
}

function saveRates(r){
  try{
    localStorage.setItem(RATE_CACHE_KEY,JSON.stringify(r));
    localStorage.setItem(RATE_TS_KEY,Date.now().toString());
  }catch(e){}
}

function showRateToast(msg,done=false){
  let el=document.getElementById('rate-toast');
  if(!el){
    el=document.createElement('div');
    el.id='rate-toast';
    el.style.cssText='position:fixed;bottom:calc(var(--ad-h) + 80px);left:50%;transform:translateX(-50%);background:rgba(13,13,20,.95);border:1px solid rgba(201,168,76,.3);color:var(--gold);font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:8px 18px;border-radius:20px;z-index:9999;transition:opacity .4s;pointer-events:none;text-align:center;white-space:nowrap';
    document.body.appendChild(el);
  }
  el.textContent=msg;
  el.style.opacity='1';
  if(done){setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),400);},2000);}
}

async function fetchRates(){
  // Use cached rates first (instant display)
  const hasCached=loadCachedRates();
  if(hasCached){render();return;}

  // Show loading toast
  showRateToast('⟳ Updating exchange rates...');

  const APIS=[
    async()=>{
      const r=await fetch('https://api.frankfurter.app/latest?from=EUR',{signal:AbortSignal.timeout(6000)});
      const d=await r.json();return d.rates;
    },
    async()=>{
      const r=await fetch('https://open.er-api.com/v6/latest/EUR',{signal:AbortSignal.timeout(6000)});
      const d=await r.json();return d.rates;
    },
    async()=>{
      const r=await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/eur.json',{signal:AbortSignal.timeout(6000)});
      const d=await r.json();
      // This API returns lowercase keys
      const rates={};Object.entries(d.eur||{}).forEach(([k,v])=>{rates[k.toUpperCase()]=v;});
      return rates;
    },
  ];

  for(const api of APIS){
    try{
      const rates=await api();
      if(rates&&rates.USD){
        rates.EUR=1;
        S.rates=rates;
        saveRates(rates);
        showRateToast('✓ Rates updated',true);
        render();
        return;
      }
    }catch(e){continue;}
  }

  // All APIs failed — use cache even if stale, or set EUR=1
  if(!hasCached){
    S.rates={EUR:1,USD:1.08,GBP:0.86,CHF:0.96,JPY:163,CAD:1.48,AUD:1.65,SEK:11.2,NOK:11.5,DKK:7.46};
    showRateToast('⚠ Using fallback rates',true);
    render();
  } else {
    showRateToast('⚠ Using cached rates',true);
  }
}

// Refresh rates every hour while app is open
setInterval(()=>{
  const ts=parseInt(localStorage.getItem(RATE_TS_KEY)||'0');
  if(Date.now()-ts>RATE_TTL) fetchRates();
},60000);

// ── CURRENCY BTN ──
function buildCurrencyBtn(){
  const dcur=S.displayCurrency;
  const cur=CURRENCIES[dcur]||CURRENCIES.EUR;
  const wrap=document.createElement('div');
  wrap.style.position='relative';
  const btn=document.createElement('button');
  btn.className='lang-pill';
  btn.innerHTML=`<span style="font-size:13px">${cur.symbol}</span> <span style="font-size:9px;opacity:.6">▾</span>`;
  btn.onclick=()=>{S.currOpen=!S.currOpen;S.langOpen=false;render();};
  wrap.appendChild(btn);
  if(S.currOpen){
    const box=document.createElement('div');
    box.className='lang-slide-wrap';
    box.style.right='0';
    const inner=document.createElement('div');
    inner.className='lang-menu-box';
    inner.style.minWidth='180px';
    DISP_CURRENCIES.forEach(code=>{
      const c=CURRENCIES[code];
      const b=document.createElement('button');
      b.className='lang-btn'+(dcur===code?' active':'');
      b.innerHTML=`<span class="flag">${c.flag}</span><span>${code} — ${c.name}</span>`;
      b.onclick=()=>{if(code!==S.displayCurrency){switchCurrency(code);}else{S.currOpen=false;render();}};
      inner.appendChild(b);
    });
    box.appendChild(inner);
    wrap.appendChild(box);
    setTimeout(()=>{
      document.addEventListener('click',function h(){S.currOpen=false;render();document.removeEventListener('click',h);},{once:true});
    },50);
  }
  return wrap;
}

// ── APP SHELL ──
function buildApp(){
  const el=document.createElement('div');
  el.style.cssText='display:flex;flex-direction:column;height:100%;position:relative';
  // Settings page takes over (triggered by gear icon)
  if(S.settingsPage!==undefined&&S.settingsPage!==null||S.showSettings){
    el.appendChild(buildHeader());
    const scr=document.createElement('div');scr.className='screen fade';
    scr.appendChild(buildSettingsTab());
    el.appendChild(scr);
    el.appendChild(buildTabBar());
    return el;
  }
  // Portfolio view
  if(S.viewPortfolio){
    el.appendChild(buildHeader());
    const scr=document.createElement('div');scr.className='screen fade';
    scr.appendChild(buildPortfolioView());
    el.appendChild(scr);
    el.appendChild(buildTabBar());
    return el;
  }
  el.appendChild(buildHeader());
  const scr=document.createElement('div');
  scr.className='screen fade';
  if(S.tab==='live')scr.appendChild(buildLiveTab());
  else if(S.tab==='accounts')scr.appendChild(buildAccTab());
  else if(S.tab==='assets')scr.appendChild(buildAssetsTab());
  else if(S.tab==='analytics')scr.appendChild(buildAnalyticsTab());
  el.appendChild(scr);
  el.appendChild(buildTabBar());
  return el;
}

  const ps=perSec(),te=todayE(ps);

  // ── Top row: branding + controls ──
  const top=document.createElement('div');

  gearBtn.onclick=()=>{S.showSettings=!S.showSettings;S.settingsPage=null;render();};
  controls.appendChild(gearBtn);
  top.appendChild(brand);
  top.appendChild(controls);
  el.appendChild(top);

  // ── Main: label + number + sublabel ──
  const dcur=S.displayCurrency;

  const rateInfo=dcur==='EUR'?'':(rateAge!==null?`<span style="font-size:8px;color:rgba(240,237,232,.2);margin-left:6px">rate ${rateAge<60?rateAge+'m':Math.round(rateAge/60)+'h'} ago</span>`:'<span style="font-size:8px;color:rgba(240,237,232,.2);margin-left:6px">loading...</span>');
  const main=document.createElement('div');
  main.innerHTML=`
    <div class="header-sub">${t('todayEarned')}</div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:3px">
      <div class="total-bal" style="color:var(--grn)">${fmtD(te,'EUR',4)}</div>
      <span class="live-dot" style="flex-shrink:0;margin-top:2px"></span>
      ${rateInfo}

  el.appendChild(main);
  return el;
}

          e.stopPropagation();
          const idx=S.timers.findIndex(x=>x.id===tm.id);

            // Resume: reset startedAt, keep elapsed
            S.timers[idx]={...S.timers[idx],paused:false,startedAt:Date.now()};

            // Pause: save elapsed, remove startedAt
            S.timers[idx]={...S.timers[idx],paused:true,elapsed:(tm.elapsed||0)+(Date.now()-tm.startedAt)};

          persist();render();
        };

        tw.appendChild(tc);

      const pct=tb>0?(toDisp(curBal,acc.currency||'EUR')/tb*100):0;
      const mutCount=(acc.mutations||[]).length;
      const typeLabel=acc.type==='savings'?t('spaar'):acc.type==='current'?t('currentAcc'):t('beleg');

      const item=document.createElement('div');
      item.className='acc-item';

      // ── Rij (altijd zichtbaar) ──
      const row=document.createElement('div');
      row.className='acc-row';
      row.innerHTML=`
        <div class="acc-dot" style="background:${color}"></div>
        <div class="acc-row-info">
          <div class="acc-name">${acc.name}</div>
          <div class="acc-meta">${typeLabel} · ${pct.toFixed(1)}%</div>
        </div>
        <div class="acc-bal" style="color:${color}">${fmtC(curBal,acc.currency||'EUR',2)}</div>
        <span class="acc-chevron">▼</span>
      `;

      // ── Uitklapgedeelte ──
      const expand=document.createElement('div');
      expand.className='acc-expand';

      const statsHtml=acc.type==='current'?`
        <div class="acc-stat"><div class="acc-stat-label">${t('balance')}</div><div class="acc-stat-val" style="color:${color}">${fmtC(curBal,acc.currency||'EUR',2)}</div></div>
      `:`
        <div class="acc-stat"><div class="acc-stat-label">${t('perYear')}</div><div class="acc-stat-val" style="color:${color}">${fmtC(yr,acc.currency||'EUR',2)}</div></div>
        <div class="acc-stat"><div class="acc-stat-label">${t('perDay')}</div><div class="acc-stat-val" style="color:${color}">${fmtC(yr/365.25,acc.currency||'EUR',2)}</div></div>
        <div class="acc-stat"><div class="acc-stat-label">${acc.type==='savings'?t('rate'):t('dividend').split(' ')[0]}</div><div class="acc-stat-val" style="color:${color}">${acc.type==='savings'?acc.rate+'%':fmtC(curDiv,acc.currency||'EUR',2)}</div></div>
      `;
      expand.innerHTML=`<div class="acc-stats">${statsHtml}</div>`;

      // ── Actieknoppen ──
      const actRow=document.createElement('div');
      actRow.className='acc-act-row';

      const mutBtn=document.createElement('button');
      mutBtn.style.cssText=`color:${color}`;
      mutBtn.innerHTML=`<span>+</span>${t('mutations')}${mutCount>0?' ('+mutCount+')':''}`;
      mutBtn.onclick=(e)=>{e.stopPropagation();S.editAcc=acc;S.modal='viewMutations';S.form={};render();};

      const adjBtn=document.createElement('button');
      adjBtn.style.cssText='color:var(--gold)';
      adjBtn.innerHTML=`<span>✎</span>${t('adjustValues')||'Aanpassen'}`;
      adjBtn.onclick=(e)=>{e.stopPropagation();S.editAcc=acc;S.modal='adjustValues';S.form={adjDate:new Date().toISOString().split('T')[0],adjBal:'',adjDiv:''};render();};

      const trBtn=document.createElement('button');
      trBtn.style.cssText='color:var(--muted)';
      trBtn.innerHTML=`<span>↔</span>${t('transfer')}`;
      trBtn.onclick=(e)=>{e.stopPropagation();S.editAcc=acc;S.modal='transfer';S.form={};render();};

      const editBtn=document.createElement('button');
      editBtn.style.cssText='color:var(--muted)';
      editBtn.innerHTML=`<span>⚙</span>${t('editAccount')}`;
      editBtn.onclick=(e)=>{e.stopPropagation();S.editAcc=acc;S.modal='editAccount';S.form={...acc};render();};

      actRow.appendChild(mutBtn);
      actRow.appendChild(adjBtn);
      actRow.appendChild(trBtn);
      actRow.appendChild(editBtn);
      expand.appendChild(actRow);

      // ── Toggle ──
      row.onclick=()=>{
        const chevron=row.querySelector('.acc-chevron');
        const isOpen=expand.classList.contains('open');
        list.querySelectorAll('.acc-expand.open').forEach(e=>e.classList.remove('open'));
        list.querySelectorAll('.acc-chevron.open').forEach(c=>c.classList.remove('open'));
        if(!isOpen){expand.classList.add('open');chevron.classList.add('open');}
      };

      item.appendChild(row);
      item.appendChild(expand);
      list.appendChild(item);
    });
    const pw=document.createElement('div');pw.className='powered';pw.textContent=t('powered');
    list.appendChild(pw);
    el.appendChild(list);
  }
  const fab=document.createElement('button');
  fab.className='fab';
  fab.textContent='+';
  fab.onclick=()=>{S.modal='addAccount';S.form={type:'savings',color:'#4ecb8d'};render();};
  el.appendChild(fab);
  return el;
}

// ── ANALYTICS TAB ──
function buildAnalyticsTab(){
  const el=document.createElement('div');
  el.className='analytics';

  // ── AD PAYWALL: once per day, watch a rewarded ad for full access ──
  const lastAd=localStorage.getItem('pi_lastAdDay');
  const today=new Date().toISOString().split('T')[0];
  if(lastAd!==today&&!S.analyticsAdWatched){
    const aw=document.createElement('div');
    aw.style.cssText='display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;padding:32px 24px;text-align:center';
    aw.innerHTML=`<div style="width:72px;height:72px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:20px">📊</div>
      <div style="font-size:20px;color:var(--txt);margin-bottom:8px;font-family:var(--serif)">${t('analytics')}</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:28px;max-width:260px;line-height:1.8">Watch one short ad for full day access to analytics.</div>
      <button id="watchAdBtn" style="width:100%;max-width:280px;padding:15px;background:var(--gold);color:var(--bg);border:none;border-radius:14px;font-size:13px;font-weight:500;font-family:var(--mono);cursor:pointer">▶ Watch ad</button>
      <div id="adStatus" style="font-size:11px;color:var(--muted);margin-top:12px;min-height:16px"></div>`;
    el.appendChild(aw);
    setTimeout(()=>{
      const btn=document.getElementById('watchAdBtn');
      const status=document.getElementById('adStatus');
      if(!btn) return;
      btn.onclick=async()=>{
        btn.disabled=true;
        btn.textContent='Loading...';
        try{
          if(window.Capacitor?.Plugins?.AdMob){
            const A=window.Capacitor.Plugins.AdMob;
            // Reward listener: unlock only when ad is fully completed
            const rewardListener=await A.addListener('rewarded',()=>{
              rewardListener.remove();
              S.analyticsAdWatched=true;
              localStorage.setItem('pi_lastAdDay',today);
              render();
            });
            await A.prepareRewardVideoAd({adId:AD_REWARDED,isTesting:false});
            await A.showRewardVideoAd();
          } else {
            // Browser fallback (no Capacitor): unlock immediately
            S.analyticsAdWatched=true;
            localStorage.setItem('pi_lastAdDay',today);
            render();
          }
        }catch(e){
          btn.disabled=false;
          btn.textContent='▶ Watch ad';
          if(status) status.textContent='Ad unavailable, please try again.';
        }
      };
    },10);
    return el;
  }

  if(S.accounts.length===0&&S.assets.length===0){
    el.innerHTML=`<div class="empty"><div class="empty-icon">📊</div><div class="empty-txt">${t('noAccounts')}</div><div class="empty-sub">${t('noAccountsSub')}</div></div>`;
    return el;
  }
  const yi=yearlyInc(),tb=totalBal();
  const av=S.analyticsView||'overview';

  // ── BACK BUTTON helper ──
  function backBtn(label,target){
    const b=document.createElement('button');
    b.style.cssText='display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--muted);font-size:12px;padding:16px 16px 4px;font-family:var(--mono);cursor:pointer';
    b.innerHTML='← '+label;
    b.onclick=()=>{S.analyticsView=target;S.analyticsSubData=null;render();};
    return b;
  }

  // ── SVG LINE CHART helper ──
  function buildLineChart(pts,colorHex,labelFn,titleStr,fmtFn){
    if(!pts||pts.length<1)return null;
    const maxV=Math.max(...pts.map(p=>p.v),0.01);
    const W=Math.max(300,pts.length*44+60),H=160,pL=58,pR=16,pT=16,pB=28;
    const pW=W-pL-pR,pH=H-pT-pB;
    const px=i=>pL+(pts.length>1?i/(pts.length-1):0.5)*pW;
    const py=v=>pT+pH-(v/maxV)*pH;
    const yT=[0,0.25,0.5,0.75,1].map(f=>({y:pT+pH*(1-f),v:maxV*f}));
    const coords=pts.map((p,i)=>`${px(i).toFixed(1)},${py(p.v).toFixed(1)}`);
    const gradId='ag_'+Math.random().toString(36).slice(2,7);
    const card=document.createElement('div');
    card.className='chart-card';
    card.innerHTML=`<div class="chart-title">${titleStr}</div>
      <div class="chart-svg-wrap">
        <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
          <defs><linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="${colorHex}" stop-opacity=".25"/>
            <stop offset="100%" stop-color="${colorHex}" stop-opacity=".01"/>
          </linearGradient></defs>
          ${yT.map(tk=>`<line x1="${pL}" y1="${tk.y.toFixed(1)}" x2="${W-pR}" y2="${tk.y.toFixed(1)}" stroke="var(--grid-line)" stroke-width="1"/>
            <text x="${(pL-6).toFixed(1)}" y="${(tk.y+4).toFixed(1)}" text-anchor="end" font-size="9" fill="rgba(240,237,232,.3)" font-family="DM Mono,monospace">${fmtFn(tk.v)}</text>`).join('')}
          <path d="M ${px(0).toFixed(1)},${(pT+pH).toFixed(1)} L ${coords.join(' L ')} L ${px(pts.length-1).toFixed(1)},${(pT+pH).toFixed(1)} Z" fill="url(#${gradId})"/>
          <path d="M ${coords.join(' L ')}" fill="none" stroke="${colorHex}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
          ${pts.map((p,i)=>`
            <circle cx="${px(i).toFixed(1)}" cy="${py(p.v).toFixed(1)}" r="3.5" fill="${colorHex}"/>
            <text x="${px(i).toFixed(1)}" y="${(H-8).toFixed(1)}" text-anchor="middle" font-size="9" fill="rgba(240,237,232,.35)" font-family="DM Mono,monospace">${labelFn(p,i)}</text>
            ${i===pts.length-1?`<rect x="${(px(i)-32).toFixed(1)}" y="${(py(p.v)-22).toFixed(1)}" width="64" height="16" rx="4" fill="${colorHex}22"/><text x="${px(i).toFixed(1)}" y="${(py(p.v)-10).toFixed(1)}" text-anchor="middle" font-size="9" fill="${colorHex}" font-family="DM Mono,monospace">${fmtFn(p.v)}</text>`:''}
          `).join('')}
        </svg>
      </div>`;
    return card;
  }

  // ── CLICKABLE CARD helper ──
  function clickCard(innerHTML,onclick){
    const card=document.createElement('div');
    card.className='chart-card';
    card.style.cssText='cursor:pointer;position:relative';
    card.innerHTML=innerHTML+`<div style="position:absolute;top:12px;right:14px;font-size:14px;color:rgba(240,237,232,.2)">›</div>`;
    card.onclick=onclick;
    return card;
  }

  // ══════════════════════════════════
  //  VIEWS
  // ══════════════════════════════════

  // ── VIEW: INCOME DETAIL (per period) ──
  if(av==='income'){
    const chipDividers={perUur:365.25*24,perDag:365.25,perWeek:52.18,perMaand:12,perJaar:1};
    const chipLabels={perUur:t('perHour'),perDag:t('perDay'),perWeek:t('perWeek'),perMaand:t('perMonth'),perJaar:t('perYear')};
    const period=S.analyticsSubData||'perDag';
    const div=chipDividers[period];
    const label=chipLabels[period];
    const val=yi/div;

    el.appendChild(backBtn(t('analytics'),'overview'));

    // Period selector
    const sel=document.createElement('div');
    sel.style.cssText='display:flex;gap:6px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none';
    Object.entries(chipLabels).forEach(([k,l])=>{
      const b=document.createElement('button');
      const active=period===k;
      b.style.cssText=`padding:6px 14px;border-radius:20px;font-size:11px;font-family:var(--mono);cursor:pointer;white-space:nowrap;border:1px solid ${active?'var(--gold)':'var(--brd)'};background:${active?'rgba(201,168,76,.15)':'rgba(255,255,255,.04)'};color:${active?'var(--gold)':'var(--muted)'}`;
      b.textContent=l;
      b.onclick=()=>{S.analyticsSubData=k;render();};
      sel.appendChild(b);
    });
    el.appendChild(sel);

    // Hero value
    const hero=document.createElement('div');
    hero.className='chart-card';
    hero.innerHTML=`<div class="chart-title">${label}</div>
      <div style="font-size:36px;font-family:var(--serif);color:var(--grn);margin-bottom:4px">${fmtD(val,'EUR',4)}</div>
      <div style="font-size:11px;color:var(--muted)">${label.toLowerCase()} ${t('passiveRate').toLowerCase()}</div>`;
    el.appendChild(hero);

    // Growth chart monthly
    const now=new Date(),numM=now.getMonth()+1;
    const mL=t('months');
    const pts=[];
    for(let m=0;m<numM;m++){
      const mid=new Date(now.getFullYear(),m,15);
      const v=S.accounts.reduce((s,a)=>{
        const sd=a.startDate?new Date(a.startDate):new Date(now.getFullYear(),0,1);
        if(sd<=mid){return s+(accYrInc(a))/div;}
        return s;
      },0);
      pts.push({m,v});
    }
    if(pts.length>0)pts[pts.length-1].v=val;
    const lc=buildLineChart(pts,'#4ecb8d',
      (p)=>mL[p.m],
      `${label} — ${t('growthThisYear')}`,
      v=>`${fmtD(v,'EUR',2)}`
    );
    if(lc)el.appendChild(lc);

    // Per account bars
    const barData=[
      ...S.accounts.map(a=>({
        name:a.name,
        val:toDisp(accYrInc(a),a.currency||'EUR')/div,
        color:a.color||(a.type==='savings'?'#4ecb8d':'#5b9cf6'),
      })),
      ...S.assets.map(a=>({
        name:a.name,
        val:toDisp(assetYrInc(a),a.currency||'EUR')/div,
        color:a.color||(ASSET_CATS[a.category]||ASSET_CATS.other).dc,
      }))
    ].filter(d=>d.val>0).sort((a,b)=>b.val-a.val);
    const maxB=barData.length?Math.max(...barData.map(d=>d.val)):1;
    const barCard=document.createElement('div');
    barCard.className='chart-card';
    barCard.innerHTML=`<div class="chart-title">Per rekening — ${label.toLowerCase()}</div>`
      +barData.map(d=>`<div class="bar-row"><div class="bar-label">${d.name}</div><div class="bar-track"><div class="bar-fill" style="width:${(d.val/maxB*100).toFixed(1)}%;background:${d.color}"></div></div><div class="bar-val" style="color:${d.color}">${fmtD(d.val,'EUR',2)}</div></div>`).join('');
    el.appendChild(barCard);
  }

  // ── VIEW: GROWTH (balance over time) ──
  else if(av==='growth'){
    el.appendChild(backBtn(t('analytics'),'overview'));
    const period=S.analyticsSubData||'monthly';

    // Period toggle
    const tog=document.createElement('div');
    tog.style.cssText='display:flex;background:var(--hover);border-radius:12px;padding:3px;margin:0 16px 12px;gap:3px';
    [['monthly','Monthly'],['weekly','Weekly'],['daily','Daily']].forEach(([k,l])=>{
      const b=document.createElement('button');
      const active=period===k;
      b.style.cssText=`flex:1;padding:7px;border-radius:9px;font-size:11px;font-family:var(--mono);border:none;cursor:pointer;background:${active?'var(--surf)':'none'};color:${active?'var(--txt)':'var(--muted)'}`;
      b.textContent=l;
      b.onclick=()=>{S.analyticsSubData=k;render();};
      tog.appendChild(b);
    });
    el.appendChild(tog);

    const now=new Date();
    let pts=[];
    if(period==='monthly'){
      const numM=now.getMonth()+1;
      const mL=t('months');
      for(let m=0;m<numM;m++){
        const mid=new Date(now.getFullYear(),m,15);
        const v=S.accounts.reduce((s,a)=>{
          const sd=a.startDate?new Date(a.startDate):new Date(now.getFullYear(),0,1);
          if(sd<=mid)return s+toDisp(accBal(a),a.currency||'EUR');
          return s;
        },0);
        pts.push({v,label:mL[m]});
      }
      pts[pts.length-1].v=tb;
      const lc=buildLineChart(pts,'#5b9cf6',p=>p.label,'Totaal vermogen — maandelijks',v=>fmtD(v,'EUR',0));
      if(lc)el.appendChild(lc);
    } else if(period==='weekly'){
      const numW=Math.ceil((now-new Date(now.getFullYear(),0,1))/604800000);
      for(let w=0;w<Math.min(numW,52);w++){
        const d=new Date(now.getFullYear(),0,1+w*7);
        const v=S.accounts.reduce((s,a)=>{
          const sd=a.startDate?new Date(a.startDate):new Date(now.getFullYear(),0,1);
          if(sd<=d)return s+toDisp(accBal(a),a.currency||'EUR');
          return s;
        },0);
        pts.push({v,label:`W${w+1}`});
      }
      pts[pts.length-1].v=tb;
      const lc=buildLineChart(pts,'#5b9cf6',p=>p.label,'Totaal vermogen — wekelijks',v=>fmtD(v,'EUR',0));
      if(lc)el.appendChild(lc);
    } else {
      // Daily - last 30 days
      for(let d=29;d>=0;d--){
        const day=new Date(now-d*86400000);
        const dayStr=day.toISOString().split('T')[0];
        const label=`${day.getDate()}/${day.getMonth()+1}`;
        const v=S.accounts.reduce((s,a)=>{
          const sd=a.startDate?new Date(a.startDate):new Date(now.getFullYear(),0,1);
          if(sd<=day)return s+toDisp(accBal(a),a.currency||'EUR');
          return s;
        },0);
        pts.push({v,label});
      }
      const lc=buildLineChart(pts,'#5b9cf6',(p,i)=>i%5===0?p.label:'','Totaal vermogen — afgelopen 30 dagen',v=>fmtD(v,'EUR',0));
      if(lc)el.appendChild(lc);
    }

    // YTD income
    const incCard=document.createElement('div');
    incCard.className='chart-card';
    const ytd=ytdE();
    incCard.innerHTML=`<div class="chart-title">Inkomen dit jaar</div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:4px">
        <div><div style="font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px">YTD</div><div style="font-size:22px;font-family:var(--serif);color:var(--grn)">${fmtD(ytd,'EUR',2)}</div></div>
        <div><div style="font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px">${t('perDay')}</div><div style="font-size:22px;font-family:var(--serif);color:var(--grn)">${fmtD(yi/365.25,'EUR',2)}</div></div>
        <div><div style="font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px">${t('perYear')}</div><div style="font-size:22px;font-family:var(--serif);color:var(--gold)">${fmtD(yi,'EUR',2)}</div></div>
      </div>`;
    el.appendChild(incCard);
  }

  // ── VIEW: PROJECTION ──
  else if(av==='projection'){
    el.appendChild(backBtn(t('analytics'),'overview'));
    const goal=S.goalTarget||1000;
    const perMonth=yi/12;
    const pct=perMonth>0?(perMonth/goal*100):0;

    const goalCard=document.createElement('div');
    goalCard.className='chart-card';
    goalCard.innerHTML=`<div class="chart-title">Maandelijks inkomen doel</div>
      <div style="margin:12px 0 8px">
        <input id="goalInput" type="number" inputmode="decimal" value="${goal}"
          style="width:100%;background:var(--surf2);border:1px solid var(--brd);border-radius:12px;padding:10px 14px;color:var(--txt);font-family:var(--serif);font-size:22px">
      </div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:14px">Stel jouw doel per maand in</div>
      <div style="background:var(--btn-bg);border-radius:8px;height:10px;overflow:hidden;margin-bottom:8px">
        <div style="height:100%;width:${Math.min(pct,100).toFixed(1)}%;background:${pct>=100?'var(--grn)':'var(--gold)'};border-radius:8px;transition:width .4s"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px">
        <span style="color:var(--grn)">${fmtD(perMonth,'EUR',2)}/mnd huidig</span>
        <span style="color:${pct>=100?'var(--grn)':'var(--muted)'}">${pct.toFixed(1)}%</span>
      </div>`;
    el.appendChild(goalCard);
    goalCard.querySelector('#goalInput').oninput=(e)=>{S.goalTarget=parseFloat(e.target.value)||1000;persist();render();};

    // ── Income breakdown by source toward goal ──
    const breakdownCard=document.createElement('div');
    breakdownCard.className='chart-card';
    const sources=[];
    // Savings accounts
    const savMonthly=S.accounts.filter(a=>a.type==='savings').reduce((s,a)=>s+toDisp(accYrInc(a),a.currency||'EUR'),0)/12;
    if(savMonthly>0)sources.push({name:t('savings'),val:savMonthly,color:'#4ecb8d'});
    // Investment accounts (dividends)
    const divMonthly=S.accounts.filter(a=>a.type==='investment').reduce((s,a)=>s+toDisp(accYrInc(a),a.currency||'EUR'),0)/12;
    if(divMonthly>0)sources.push({name:t('investment')+' ('+t('dividend').split(' ')[0]+')',val:divMonthly,color:'#5b9cf6'});
    // Assets per category
    const assetByCat={};
    S.assets.forEach(a=>{
      const cat=a.category||'other';
      const monthly=toDisp(assetYrInc(a),a.currency||'EUR')/12;
      if(monthly>0){
        if(!assetByCat[cat])assetByCat[cat]={name:t(cat),val:0,color:a.color||(ASSET_CATS[cat]||ASSET_CATS.other).dc};
        assetByCat[cat].val+=monthly;
      }
    });
    Object.values(assetByCat).forEach(s=>sources.push(s));
    sources.sort((a,b)=>b.val-a.val);

    // Build stacked bar showing contribution of each source to goal
    let breakdownHTML=`<div class="chart-title">Uitsplitsing per bron</div>`;
    if(sources.length>0){
      // Stacked bar
      breakdownHTML+=`<div style="display:flex;border-radius:8px;overflow:hidden;height:28px;margin:10px 0 14px;gap:1px">`;
      sources.forEach(src=>{
        const srcPct=Math.max(src.val/goal*100,1);
        breakdownHTML+=`<div style="width:${srcPct.toFixed(1)}%;background:${src.color};min-width:3px" title="${src.name}: ${fmtD(src.val,'EUR',2)}/mnd"></div>`;
      });
      // Remaining gap
      const totalSrcPct=sources.reduce((s,src)=>s+src.val/goal*100,0);
      if(totalSrcPct<100){
        breakdownHTML+=`<div style="flex:1;background:var(--surf2)"></div>`;
      }
      breakdownHTML+=`</div>`;
      // Per source rows
      sources.forEach(src=>{
        const srcPct=Math.min(src.val/goal*100,100);
        breakdownHTML+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--brd)">
          <div style="display:flex;align-items:center;gap:8px">
            <div style="width:10px;height:10px;border-radius:50%;background:${src.color};flex-shrink:0"></div>
            <span style="font-size:12px;color:var(--txt)">${src.name}</span>
          </div>
          <div style="text-align:right">
            <span style="font-size:13px;color:${src.color};font-family:var(--serif)">${fmtD(src.val,'EUR',2)}</span>
            <span style="font-size:10px;color:var(--muted)">/mnd</span>
            <span style="font-size:10px;color:var(--muted);margin-left:6px">(${srcPct.toFixed(1)}%)</span>
          </div>
        </div>`;
      });
      // Total row
      breakdownHTML+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;margin-top:4px">
        <span style="font-size:12px;color:var(--muted);font-weight:500">Totaal</span>
        <div>
          <span style="font-size:14px;color:var(--grn);font-family:var(--serif)">${fmtD(perMonth,'EUR',2)}</span>
          <span style="font-size:10px;color:var(--muted)">/mnd</span>
          <span style="font-size:10px;color:var(--muted);margin-left:6px">van ${fmtD(goal,'EUR',0)}</span>
        </div>
      </div>`;
    } else {
      breakdownHTML+=`<div style="font-size:12px;color:var(--muted);padding:12px 0">Voeg inkomstenbronnen toe om de uitsplitsing te zien.</div>`;
    }
    breakdownCard.innerHTML=breakdownHTML;
    el.appendChild(breakdownCard);

    // Months to goal
    const remaining=goal-perMonth;
    const projCard=document.createElement('div');
    projCard.className='chart-card';
    if(pct>=100){
      projCard.innerHTML=`<div class="chart-title">Doel bereikt! 🎉</div>
        <div style="font-size:14px;color:var(--grn);margin-top:8px">Je passief inkomen van ${fmtD(perMonth,'EUR',2)}/mnd overstijgt je doel van ${fmtD(goal,'EUR',2)}/mnd.</div>`;
    } else if(yi<=0){
      projCard.innerHTML=`<div class="chart-title">Projectie</div><div style="font-size:13px;color:var(--muted);margin-top:8px">Voeg rekeningen toe om een projectie te zien.</div>`;
    } else {
      // Simulate months needed (compound via yearly income staying constant)
      const monthsNeeded=Math.ceil((goal/(yi/12)-1)*12);
      projCard.innerHTML=`<div class="chart-title">Projectie</div>
        <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:8px">
          <div>
            <div style="font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px">Nog nodig</div>
            <div style="font-size:20px;font-family:var(--serif);color:var(--red)">${fmtD(remaining,'EUR',2)}/mnd</div>
          </div>
          <div>
            <div style="font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px">Extra kapitaal nodig</div>
            <div style="font-size:20px;font-family:var(--serif);color:var(--blu)">${fmtD(remaining*12/Math.max(parseFloat(S.accounts[0]?.rate||5)/100,0.01),'EUR',0)}</div>
          </div>
        </div>`;
    }
    el.appendChild(projCard);

    // Income milestones
    const milestones=[100,250,500,1000,2500,5000].filter(m=>m>=perMonth*0.5);
    const msCard=document.createElement('div');
    msCard.className='chart-card';
    msCard.innerHTML=`<div class="chart-title">Mijlpalen</div>`+
      milestones.slice(0,5).map(m=>{
        const p=Math.min(perMonth/m*100,100);
        const done=p>=100;
        return `<div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">
            <span style="color:${done?'var(--grn)':'var(--txt)'}">${done?'✓ ':''} ${fmtD(m,'EUR',0)}/mnd</span>
            <span style="color:var(--muted)">${p.toFixed(0)}%</span>
          </div>
          <div style="background:var(--btn-bg);border-radius:4px;height:5px;overflow:hidden">
            <div style="height:100%;width:${p.toFixed(1)}%;background:${done?'var(--grn)':'var(--gold)'};border-radius:4px"></div>
          </div>
        </div>`;
      }).join('');
    el.appendChild(msCard);
  }

  // ── VIEW: ACCOUNT DETAIL ──
  else if(av==='accountDetail'){
    const acc=S.analyticsSubData;
    if(!acc){S.analyticsView='overview';render();return el;}
    el.appendChild(backBtn(t('analytics'),'overview'));

    const isSavings=acc.type==='savings';
    const color=isSavings?'var(--grn)':'var(--blu)';
    const curBal=accBal(acc),curDiv=accDiv(acc);
    const yr=isSavings?curBal*parseFloat(acc.rate)/100:curDiv;

    // Hero
    const hero=document.createElement('div');
    hero.className='chart-card';
    hero.innerHTML=`<div class="chart-title">${acc.name}</div>
      <div style="font-size:32px;font-family:var(--serif);color:${color};margin-bottom:8px">${fmtC(curBal,acc.currency||'EUR',2)}</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px">
        <div><span style="color:var(--muted)">${t('perYear')}: </span><span style="color:${color}">${fmtC(yr,acc.currency||'EUR',2)}</span></div>
        <div><span style="color:var(--muted)">${t('perDay')}: </span><span style="color:${color}">${fmtC(yr/365.25,acc.currency||'EUR',4)}</span></div>
        ${isSavings?`<div><span style="color:var(--muted)">${t('rate')}: </span><span style="color:var(--grn)">${acc.rate}%</span></div>`:''}
        ${acc.currency&&acc.currency!=='EUR'?`<div><span style="color:var(--muted)">≈ </span><span style="color:var(--gold)">${fmtD(toDisp(yr,acc.currency||'EUR'),'EUR',2)}/jr</span></div>`:''}
      </div>`;
    el.appendChild(hero);

    // Mutation history chart if available
    const muts=(acc.mutations||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
    if(muts.length>0){
      let runBal=parseFloat(acc.balance||0);
      const balPts=[{v:runBal,label:acc.startDate?acc.startDate.slice(5):'Start'}];
      muts.forEach(m=>{runBal+=parseFloat(m.inleg||0);balPts.push({v:runBal,label:m.date.slice(5)});});
      const lc=buildLineChart(balPts,'#5b9cf6',p=>p.label,'Saldo verloop',v=>fmtC(v,acc.currency||'EUR',0));
      if(lc)el.appendChild(lc);
    }

    // Stats breakdown
    const statsCard=document.createElement('div');
    statsCard.className='chart-card';
    statsCard.innerHTML=`<div class="chart-title">Statistieken</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px">
        ${[
          [t('perHour'), fmtC(yr/365.25/24,acc.currency||'EUR',6)],
          [t('perDay'), fmtC(yr/365.25,acc.currency||'EUR',4)],
          [t('perWeek'), fmtC(yr/52.18,acc.currency||'EUR',2)],
          [t('perMonth'), fmtC(yr/12,acc.currency||'EUR',2)],
          [t('perYear'), fmtC(yr,acc.currency||'EUR',2)],
          ['YTD', fmtC(yr/365.25*(new Date()-new Date(new Date().getFullYear(),0,1))/86400000,acc.currency||'EUR',2)],
        ].map(([l,v])=>`<div style="background:var(--surf2);border-radius:12px;padding:10px 12px">
          <div style="font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px">${l}</div>
          <div style="font-size:14px;color:${color};font-family:var(--serif)">${v}</div>
        </div>`).join('')}
      </div>`;
    el.appendChild(statsCard);
  }

  // ── VIEW: DIVERSIFICATION ──
  else if(av==='diversification'){
    el.appendChild(backBtn(t('analytics'),'overview'));

    const totalYr=yi;
    const savings=S.accounts.filter(a=>a.type==='savings');
    const investments=S.accounts.filter(a=>a.type==='investment');
    const savInc=savings.reduce((s,a)=>s+toDisp(accYrInc(a),a.currency||'EUR'),0);
    const invInc=investments.reduce((s,a)=>s+toDisp(accYrInc(a),a.currency||'EUR'),0)
      +S.assets.reduce((s,a)=>s+toDisp(assetYrInc(a),a.currency||'EUR'),0);

    // Split bar
    const splitCard=document.createElement('div');
    splitCard.className='chart-card';
    const savPct=totalYr>0?(savInc/totalYr*100):50;
    const invPct=100-savPct;
    splitCard.innerHTML=`<div class="chart-title">${t('dagverdeling')}</div>
      <div style="display:flex;border-radius:10px;overflow:hidden;height:32px;margin:12px 0 8px;gap:2px">
        <div style="width:${savPct.toFixed(1)}%;background:#4ecb8d;display:flex;align-items:center;justify-content:center;font-size:11px;color:#0d0d14;font-family:var(--mono)">${savPct.toFixed(0)}%</div>
        <div style="flex:1;background:#5b9cf6;display:flex;align-items:center;justify-content:center;font-size:11px;color:#0d0d14;font-family:var(--mono)">${invPct.toFixed(0)}%</div>
      </div>
      <div style="display:flex;gap:16px;font-size:11px">
        <span style="color:#4ecb8d">● ${t('savings')} ${fmtD(savInc,'EUR',2)}/jr</span>
        <span style="color:#5b9cf6">● ${t('investment')} ${fmtD(invInc,'EUR',2)}/jr</span>
      </div>`;
    el.appendChild(splitCard);

    // Per account breakdown
    const accCard=document.createElement('div');
    accCard.className='chart-card';
    const allAcc=S.accounts.map(a=>{
      const inc=toDisp(accYrInc(a),a.currency||'EUR');
      return {name:a.name,inc,pct:totalYr>0?(inc/totalYr*100):0,color:a.type==='savings'?'#4ecb8d':'#5b9cf6'};
    }).sort((a,b)=>b.inc-a.inc);
    accCard.innerHTML=`<div class="chart-title">Per rekening</div>`+
      allAcc.map(a=>`<div class="bar-row" style="margin-bottom:10px">
        <div class="bar-label" style="color:${a.color}">${a.name}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${a.pct.toFixed(1)}%;background:${a.color}"></div></div>
        <div class="bar-val" style="color:${a.color}">${fmtD(a.inc,'EUR',2)}</div>
      </div>`).join('');
    el.appendChild(accCard);

    // Currency distribution
    const byCur={};
    S.accounts.forEach(a=>{
      const cur=a.currency||'EUR';
      const inc=toDisp(accYrInc(a),cur);
      byCur[cur]=(byCur[cur]||0)+inc;
    });
    if(Object.keys(byCur).length>1){
      const curCard=document.createElement('div');
      curCard.className='chart-card';
      const totalCur=Object.values(byCur).reduce((s,v)=>s+v,0);
      curCard.innerHTML=`<div class="chart-title">Per valuta (omgerekend)</div>`+
        Object.entries(byCur).sort((a,b)=>b[1]-a[1]).map(([cur,val])=>{
          const pct=totalCur>0?(val/totalCur*100):0;
          const cinfo=CURRENCIES[cur]||{flag:'',symbol:cur};
          return `<div class="bar-row"><div class="bar-label">${cinfo.flag} ${cur}</div><div class="bar-track"><div class="bar-fill" style="width:${pct.toFixed(1)}%;background:var(--gold)"></div></div><div class="bar-val" style="color:var(--gold)">${fmtD(val,'EUR',2)}</div></div>`;
        }).join('');
      el.appendChild(curCard);
    }
  }

  // ── VIEW: OVERVIEW (main) ──
  else {
    // KPI row — clickable
    const kpiCard=clickCard(`<div class="chart-title">${t('totalAssets')}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px">
        <div class="stat-block"><div class="stat-block-label">${t('totalAssets')}</div><div class="stat-block-val">${fmtD(tb,'EUR',2)}</div></div>
        <div class="stat-block"><div class="stat-block-label">${t('ytd')}</div><div class="stat-block-val" style="color:var(--grn)">${fmtD(ytdE(),'EUR',2)}</div></div>
        <div class="stat-block"><div class="stat-block-label">${t('perDay')}</div><div class="stat-block-val" style="color:var(--grn)">${fmtD(yi/365.25,'EUR',2)}</div></div>
        <div class="stat-block"><div class="stat-block-label">${t('passiveRate')}</div><div class="stat-block-val" style="color:var(--gold)">${fmtD(yi,'EUR',2)}</div></div>
      </div>`,
      ()=>{S.analyticsView='growth';S.analyticsSubData='monthly';render();}
    );
    el.appendChild(kpiCard);

    // Income card — clickable
    const incCard=clickCard(`<div class="chart-title">${t('passiveRate')}</div>
      <div style="font-size:28px;font-family:var(--serif);color:var(--grn);margin:6px 0 2px">${fmtD(yi/12,'EUR',2)}<span style="font-size:14px;color:var(--muted)">/mnd</span></div>
      <div style="font-size:11px;color:var(--muted)">${fmtD(yi/365.25,'EUR',4)}/dag · ${fmtD(yi,'EUR',2)}/jr</div>`,
      ()=>{S.analyticsView='income';S.analyticsSubData='perDag';render();}
    );
    el.appendChild(incCard);

    // Diversification — clickable
    const savInc=S.accounts.filter(a=>a.type==='savings').reduce((s,a)=>s+toDisp(accYrInc(a),a.currency||'EUR'),0);
    const invInc=S.accounts.filter(a=>a.type==='investment').reduce((s,a)=>s+toDisp(accYrInc(a),a.currency||'EUR'),0)
      +S.assets.reduce((s,a)=>s+toDisp(assetYrInc(a),a.currency||'EUR'),0);
    const savPct=yi>0?(savInc/yi*100):50;
    const divCard=clickCard(`<div class="chart-title">${t('dagverdeling')}</div>
      <div style="display:flex;border-radius:8px;overflow:hidden;height:24px;margin:10px 0 8px;gap:2px">
        <div style="width:${savPct.toFixed(1)}%;background:#4ecb8d"></div>
        <div style="flex:1;background:#5b9cf6"></div>
      </div>
      <div style="display:flex;gap:16px;font-size:11px">
        <span style="color:#4ecb8d">● ${t('savings')} ${savPct.toFixed(0)}%</span>
        <span style="color:#5b9cf6">● ${t('investment')} ${(100-savPct).toFixed(0)}%</span>
      </div>`,
      ()=>{S.analyticsView='diversification';S.analyticsSubData=null;render();}
    );
    el.appendChild(divCard);

    // Goal / Projection — clickable
    const perMonth=yi/12;
    const goal=S.goalTarget||1000;
    const goalPct=Math.min(perMonth/goal*100,100);
    // Mini source breakdown for goal card
    const savM=S.accounts.filter(a=>a.type==='savings').reduce((s,a)=>s+toDisp(accYrInc(a),a.currency||'EUR'),0)/12;
    const divM=S.accounts.filter(a=>a.type==='investment').reduce((s,a)=>s+toDisp(accYrInc(a),a.currency||'EUR'),0)/12;
    const assM=S.assets.reduce((s,a)=>s+toDisp(assetYrInc(a),a.currency||'EUR'),0)/12;
    const goalCard=clickCard(`<div class="chart-title">Doel voortgang</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin:8px 0 6px">
        <span style="font-size:18px;font-family:var(--serif);color:var(--gold)">${fmtD(perMonth,'EUR',2)}<span style="font-size:12px;color:var(--muted)">/mnd</span></span>
        <span style="font-size:12px;color:var(--muted)">doel: ${fmtD(goal,'EUR',0)}</span>
      </div>
      <div style="display:flex;border-radius:6px;overflow:hidden;height:8px;gap:1px">
        ${savM>0?`<div style="width:${(savM/goal*100).toFixed(1)}%;background:#4ecb8d"></div>`:''}
        ${divM>0?`<div style="width:${(divM/goal*100).toFixed(1)}%;background:#5b9cf6"></div>`:''}
        ${assM>0?`<div style="width:${(assM/goal*100).toFixed(1)}%;background:#e8c97a"></div>`:''}
        <div style="flex:1;background:var(--surf2)"></div>
      </div>
      <div style="display:flex;gap:10px;font-size:9px;color:var(--muted);margin-top:6px;flex-wrap:wrap">
        ${savM>0?`<span style="color:#4ecb8d">● ${t('savings')} ${fmtD(savM,'EUR',2)}</span>`:''}
        ${divM>0?`<span style="color:#5b9cf6">● ${t('investment')} ${fmtD(divM,'EUR',2)}</span>`:''}
        ${assM>0?`<span style="color:#e8c97a">● ${t('assets')} ${fmtD(assM,'EUR',2)}</span>`:''}
        <span>${goalPct.toFixed(1)}%</span>
      </div>`,
      ()=>{S.analyticsView='projection';render();}
    );
    el.appendChild(goalCard);

    // Per account — clickable cards
    const accTitle=document.createElement('div');
    accTitle.style.cssText='font-size:9px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;padding:4px 16px 8px';
    accTitle.textContent='Rekeningen';
    el.appendChild(accTitle);

    S.accounts.forEach(acc=>{
      const isSavings=acc.type==='savings';
      const color=acc.color||(isSavings?'#4ecb8d':'#5b9cf6');
      const yr=toDisp(accYrInc(acc),acc.currency||'EUR');
      const card=clickCard(`<div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:13px;color:var(--txt);margin-bottom:3px">${acc.name}</div>
          <div style="font-size:10px;color:var(--muted)">${isSavings?acc.rate+'%':''} ${acc.currency&&acc.currency!=='EUR'?acc.currency:''}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:16px;font-family:var(--serif);color:${color}">${fmtD(yr,'EUR',2)}/jr</div>
          <div style="font-size:11px;color:var(--muted)">${fmtD(yr/365.25,'EUR',4)}/dag</div>
        </div>
      </div>`,
        ()=>{S.analyticsView='accountDetail';S.analyticsSubData=acc;render();}
      );
      el.appendChild(card);
    });

    // Also show assets in analytics
    if(S.assets.length>0){
      const assetTitle=document.createElement('div');
      assetTitle.style.cssText='font-size:9px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;padding:4px 16px 8px';
      assetTitle.textContent=t('otherAssets');
      el.appendChild(assetTitle);
      S.assets.forEach(asset=>{
        const cat=ASSET_CATS[asset.category]||ASSET_CATS.other;
        const color=asset.color||cat.dc;
        const yr=toDisp(assetYrInc(asset),asset.currency||'EUR');
        const card=clickCard(`<div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div style="font-size:13px;color:var(--txt);margin-bottom:3px">${asset.name}</div>
            <div style="font-size:10px;color:var(--muted)">${cat.icon} ${t(asset.category)}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:16px;font-family:var(--serif);color:${color}">${fmtD(yr,'EUR',2)}/jr</div>
            <div style="font-size:11px;color:var(--muted)">${fmtD(yr/365.25,'EUR',4)}/dag</div>
          </div>
        </div>`,()=>{});
        el.appendChild(card);
      });
    }

    const pw=document.createElement('div');pw.className='powered';pw.textContent=t('powered');
    el.appendChild(pw);
  }

  return el;
}

// ── MODAL ──
function buildModal(){
  const ov=document.createElement('div');
  ov.className='modal-overlay';
  // Geen backdrop-klik om te sluiten — voorkomt sluiten bij toetsenbord wegklikken
  const m=document.createElement('div');
  m.className='modal';
  m.style.position='relative';
  m.onclick=e=>e.stopPropagation();
  const closeX=document.createElement('button');
  closeX.style.cssText='position:absolute;top:18px;right:20px;background:none;border:none;color:var(--muted);font-size:26px;line-height:1;cursor:pointer;z-index:1;padding:0 4px;opacity:.7';
  closeX.textContent='×';
  closeX.onclick=()=>{S.modal=null;render();};
  m.appendChild(closeX);
  if(S.modal==='addAccount'||S.modal==='editAccount')m.appendChild(buildAccForm());
  else if(S.modal==='addTimer'||S.modal==='editTimer')m.appendChild(buildTimerForm());
  else if(S.modal==='addMutation'||S.modal==='viewMutations')m.appendChild(buildMutationModal());
  else if(S.modal==='adjustValues')m.appendChild(buildAdjustModal());
  else if(S.modal==='transfer')m.appendChild(buildTransferForm());
  else if(S.modal==='addAsset'||S.modal==='editAsset')m.appendChild(buildAssetForm());
  else if(S.modal==='viewAssetMutations'||S.modal==='addAssetMutation')m.appendChild(buildAssetMutationModal());
  else if(S.modal==='addPosition')m.appendChild(buildAddPositionForm());
  else if(S.modal==='tickerSources')m.appendChild(buildTickerSourcesModal());
  ov.appendChild(m);
  return ov;
}

function snapshotAccForm(el){
  const v=id=>el.querySelector(id)?.value;
  if(v('#fN')!==undefined) S.form.name=v('#fN');
  if(v('#fB')!==undefined) S.form.balance=v('#fB');
  if(v('#fR')!==undefined) S.form.rate=v('#fR');
  if(v('#fD')!==undefined) S.form.dividend=v('#fD');
  if(v('#fDt')!==undefined) S.form.startDate=v('#fDt');
  if(v('#fPD')!==undefined) S.form.payoutDay=parseInt(v('#fPD'))||1;
  S.form.currency=el.querySelector('#fCur')?.value||'EUR';
}

function buildAccForm(){
  const isEdit=S.modal==='editAccount';
  const tp=S.form.type||'savings';
  const el=document.createElement('div');
  el.innerHTML=`
    <div class="modal-title">${isEdit?t('editAccount'):t('addAccount')}</div>
    <div class="field"><label>${t('type')}</label>
      <div class="type-btns">

    ${tp==='savings'?`
      <div class="field"><label>${t('rate')}</label><input id="fR" type="number" inputmode="decimal" step="0.01" placeholder="2.5" value="${S.form.rate||''}"></div>
      <div class="field"><label>Currency</label>

            ${Object.entries(CURRENCIES).map(([k,v])=>`<option value="${k}"${(S.form.currency||'EUR')===k?' selected':''}>${v.flag} ${k} — ${v.name}</option>`).join('')}

          <button class="type-btn${(S.form.payoutFreq||'monthly')==='weekly'?' active':''}" id="pfW">${t('weekly')}</button>
          <button class="type-btn${(S.form.payoutFreq||'monthly')==='monthly'?' active':''}" id="pfM">${t('monthly')}</button>
          <button class="type-btn${(S.form.payoutFreq||'monthly')==='annually'?' active':''}" id="pfA">${t('annually')}</button>

          <select id="fPD">
            ${['Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag','Zondag'].map((d,i)=>
              '<option value="'+(i+1)+'"'+(((S.form.payoutDay||1)==(i+1))?' selected':'')+'>'+d+'</option>').join('')}
          </select>
        </div>`
      :(S.form.payoutFreq||'monthly')==='monthly'?`
        <div class="field"><label>${t('payoutDayMonth')}</label>
          <select id="fPD">
            ${Array.from({length:28},(_,i)=>'<option value="'+(i+1)+'"'+((S.form.payoutDay||1)==(i+1)?' selected':'')+'>'+(i+1)+t('ordinalSuffix')+'</option>').join('')}
          </select>
        </div>`
      :''}
    `:`${tp==='investment'?`<div class="field"><label>${t('dividend')} (€)</label><input id="fD" type="number" inputmode="decimal" placeholder="1200" value="${S.form.dividend||''}"></div>`:''}`}
    <div class="field"><label>${t('startDate')}</label><input id="fDt" type="date" value="${S.form.startDate||new Date().toISOString().split('T')[0]}"></div>

  const cpSlot=el.querySelector('#cpSlot');
  if(cpSlot){

    cpField.innerHTML='<label>'+t('color')+'</label>';
    const cpRow=document.createElement('div');cpRow.className='color-pick-row';
    COLOR_PAL.forEach(c=>{
      const d=document.createElement('div');d.className='color-dot'+((S.form.color||'#4ecb8d')===c?' active':'');
      d.style.background=c;d.onclick=()=>{S.form.color=c;render();};cpRow.appendChild(d);
    });
    cpField.appendChild(cpRow);cpSlot.appendChild(cpField);
  }
  el.querySelector('#tpCur')?.addEventListener('click',()=>{snapshotAccForm(el);S.form.type='current';render();});
  el.querySelector('#tpSav').onclick=()=>{snapshotAccForm(el);S.form.type='savings';render();};
  el.querySelector('#tpInv').onclick=()=>{snapshotAccForm(el);S.form.type='investment';render();};
  if(tp==='savings'){
    el.querySelector('#pfW')?.addEventListener('click',()=>{snapshotAccForm(el);S.form.payoutFreq='weekly';S.form.payoutDay=1;render();});
    el.querySelector('#pfM')?.addEventListener('click',()=>{snapshotAccForm(el);S.form.payoutFreq='monthly';S.form.payoutDay=1;render();});
    el.querySelector('#pfA')?.addEventListener('click',()=>{snapshotAccForm(el);S.form.payoutFreq='annually';render();});
  }
  el.querySelector('#canBtn').onclick=()=>{S.modal=null;S.form={};S.editAcc=null;render();};
  if(isEdit)el.querySelector('#delBtn').onclick=()=>{
    if(!confirm(t('delAccConfirm')))return;
    S.accounts=S.accounts.filter(a=>a.id!==S.editAcc.id);
    S.modal=null;S.form={};S.editAcc=null;persist();render();
  };
  el.querySelector('#savBtn').onclick=()=>{
    const name=el.querySelector('#fN').value.trim();
    const balance=parseFloat(el.querySelector('#fB').value);
    const startDate=el.querySelector('#fDt').value;
    if(!name){S.form={...S.form,err:t('nameReq')};render();return;}
    if(isNaN(balance)){S.form={...S.form,err:t('balReq')};render();return;}
    let rate=0,dividend=0;
    if(tp==='savings'){
      rate=parseFloat(el.querySelector('#fR')?.value);
      if(isNaN(rate)){S.form={...S.form,err:t('rateReq')};render();return;}
      S.form.payoutFreq=S.form.payoutFreq||'monthly';
      S.form.payoutDay=parseInt(el.querySelector('#fPD')?.value)||1;
    } else {
      dividend=parseFloat(el.querySelector('#fD')?.value)||0;
    }
    if(isEdit){
      const idx=S.accounts.findIndex(a=>a.id===S.editAcc.id);
      S.accounts[idx]={...S.accounts[idx],name,balance,type:tp,rate,dividend,startDate,payoutFreq:S.form.payoutFreq||'monthly',payoutDay:S.form.payoutDay||1,color:S.form.color||'#4ecb8d'};
    } else {
      S.accounts.push({id:Date.now().toString(),name,balance,type:tp,rate,dividend,startDate,payoutFreq:S.form.payoutFreq||'monthly',payoutDay:S.form.payoutDay||1,currency:S.form.currency||'EUR',color:S.form.color||'#4ecb8d',mutations:[]});
    }
    S.modal=null;S.form={};S.editAcc=null;persist();render();
  };
  return el;
}
