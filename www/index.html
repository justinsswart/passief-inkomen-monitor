// ── MUTATION MODAL ──

function buildAdjustModal(){
  const acc=S.editAcc;
  const isSavings=acc.type==='savings';
  const color=isSavings?'var(--grn)':'var(--blu)';
  const el=document.createElement('div');

  const hd=document.createElement('div');
  hd.style.cssText='margin-bottom:20px';
  hd.innerHTML=`<div class="modal-title" style="margin-bottom:4px">${t('adjustValues')||'Adjust values'}</div>
    <div style="font-size:12px;color:var(--muted)">${acc.name}</div>`;
  el.appendChild(hd);

  // Show current values
  const ctx=document.createElement('div');
  ctx.style.cssText='background:var(--surf2);border-radius:12px;padding:12px 14px;margin-bottom:6px;display:flex;gap:16px;font-size:12px';
  ctx.innerHTML=`<div><span style="color:var(--muted)">${t('balance')}:</span> <span style="color:${color}">${fmtC(accBal(acc),acc.currency||'EUR',2)}</span></div>
    ${isSavings
      ?`<div><span style="color:var(--muted)">${t('rate')}:</span> <span style="color:var(--grn)">${acc.rate}%</span></div>`
      :`<div><span style="color:var(--muted)">${t('dividend').split(' ')[0]}:</span> <span style="color:var(--grn)">${fmtC(accDiv(acc),acc.currency||'EUR',2)}</span></div>`
    }`;
  el.appendChild(ctx);

  // Info label
  const info=document.createElement('div');
  info.style.cssText='font-size:10px;color:var(--muted);margin-bottom:18px;padding:0 2px';
  info.textContent=t('adjustInfo')||'Change takes effect from the chosen date';
  el.appendChild(info);

  const sym=currSym(acc.currency||'EUR');
  const form=document.createElement('div');
  form.innerHTML=`
    <div class="field"><label>${t('adjustDate')||'Effective date'}</label>
      <input id="aDt" type="date" value="${S.form.adjDate||new Date().toISOString().split('T')[0]}"></div>
    <div class="field"><label>${t('newBalance')||'New balance'} (${sym})</label>
      <input id="aBal" type="number" inputmode="decimal" placeholder="${fmtC(accBal(acc),acc.currency||'EUR',2).replace(/[^0-9.,]/g,'')}" value="${S.form.adjBal||''}"></div>
    ${isSavings
      ?`<div class="field"><label>${t('rate')}</label>
        <input id="aRate" type="number" inputmode="decimal" step="0.01" placeholder="${acc.rate}" value="${S.form.adjRate||''}"></div>`
      :`<div class="field"><label>${t('newDividend')||'New dividend/yr'} (${sym})</label>
        <input id="aDiv" type="number" inputmode="decimal" placeholder="${fmtC(accDiv(acc),acc.currency||'EUR',2).replace(/[^0-9.,]/g,'')}" value="${S.form.adjDiv||''}"></div>`
    }
    ${S.form.err?`<div class="err-msg">${S.form.err}</div>`:''}
    <div class="btn-row">
      <button class="btn-sec" id="aCan">${t('cancel')}</button>
      <button class="btn-primary" id="aSav">${t('save')}</button>
    </div>`;
  el.appendChild(form);

  form.querySelector('#aCan').onclick=()=>{S.modal=null;S.form={};S.editAcc=null;render();};
  form.querySelector('#aSav').onclick=()=>{
    const newBal=form.querySelector('#aBal').value;
    const newRate=isSavings?(form.querySelector('#aRate')?.value||''):null;
    const newDiv=isSavings?null:(form.querySelector('#aDiv')?.value||'');
    const date=form.querySelector('#aDt').value;

    if(newBal===''&&(isSavings?newRate==='':newDiv==='')){
      S.form={...S.form,err:t('balReq')};render();return;
    }

    const idx=S.accounts.findIndex(a=>a.id===acc.id);
    if(!S.accounts[idx].mutations)S.accounts[idx].mutations=[];

    // Adjust balance via mutation delta
    if(newBal!==''){
      const curBal=accBal(acc);
      const targetBal=parseFloat(newBal);
      const delta=targetBal-curBal;
      if(Math.abs(delta)>0.001){
        S.accounts[idx].mutations.push({
          id:Date.now().toString(),date,
          inleg:parseFloat(delta.toFixed(2)),dividend:0,isAdjustment:true,
        });
      }
    }

    // Savings: update rate directly (effective immediately from date chosen)
    if(isSavings&&newRate!==''){
      const targetRate=parseFloat(newRate);
      if(!isNaN(targetRate)&&Math.abs(targetRate-parseFloat(acc.rate))>0.001){
        S.accounts[idx].rate=targetRate.toString();
      }
    }

    // Investment: adjust dividend via mutation delta
    if(!isSavings&&newDiv!==''){
      const curDiv=accDiv(acc);
      const targetDiv=parseFloat(newDiv);
      const deltaDiv=targetDiv-curDiv;
      if(Math.abs(deltaDiv)>0.001){
        S.accounts[idx].mutations.push({
          id:(Date.now()+1).toString(),date,
          inleg:0,dividend:parseFloat(deltaDiv.toFixed(2)),isAdjustment:true,
        });
      }
    }

    S.accounts[idx].mutations.sort((a,b)=>a.date.localeCompare(b.date));
    S.editAcc=S.accounts[idx];
    S.modal=null;S.form={};S.editAcc=null;
    persist();render();
  };
  return el;
}

function buildMutationModal(){
  const acc=S.editAcc;
  const isSavings=acc.type==='savings';
  const color=isSavings?'var(--grn)':'var(--blu)';
  const muts=(acc.mutations||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));
  const el=document.createElement('div');

  if(S.modal==='viewMutations'){
    // Title
    const hd=document.createElement('div');
    hd.style.cssText='margin-bottom:16px';
    hd.innerHTML=`<div class="modal-title" style="margin-bottom:4px">${t('mutationHistory')}</div>
      <div style="font-size:12px;color:var(--muted)">${acc.name}</div>`;
    el.appendChild(hd);

    // Summary row - initieel + mutaties
    const sumRow=document.createElement('div');
    sumRow.style.cssText='background:var(--surf2);border-radius:14px;padding:14px;margin-bottom:16px;display:flex;gap:12px';
    const curBal=accBal(acc), curDiv=accDiv(acc);
    sumRow.innerHTML=`
      <div style="flex:1">
        <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px">${t('balance')}</div>
        <div style="font-size:18px;color:${color};font-family:var(--serif)">${fmtE(curBal,2)}</div>
      </div>
      ${!isSavings?`<div style="flex:1">
        <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px">${t('dividend').split(' ')[0]}/jr</div>
        <div style="font-size:18px;color:var(--grn);font-family:var(--serif)">${fmtE(curDiv,2)}</div>
      </div>`:''}
    `;
    el.appendChild(sumRow);

    // Add button
    const addBtn=document.createElement('button');
    addBtn.className='btn-primary';
    addBtn.style.cssText='width:100%;margin-bottom:14px';
    addBtn.textContent=t('addMutation');
    addBtn.onclick=()=>{S.modal='addMutation';S.form={mdate:new Date().toISOString().split('T')[0],minleg:'',mdiv:''};render();};
    el.appendChild(addBtn);

    // Mutation list
    if(muts.length===0){
      const empty=document.createElement('div');
      empty.style.cssText='color:var(--muted);font-size:13px;padding:12px 0;text-align:center';
      empty.textContent=t('noMutations');
      el.appendChild(empty);
    } else {
      // Running totals for display
      let runBal=parseFloat(acc.balance||0), runDiv=parseFloat(acc.dividend||0);
      const mutsAsc=(acc.mutations||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
      const totalsMap={};
      mutsAsc.forEach(m=>{
        runBal+=parseFloat(m.inleg||0);
        runDiv+=parseFloat(m.dividend||0);
        totalsMap[m.id]={bal:runBal,div:runDiv};
      });

      muts.forEach(m=>{
        const tot=totalsMap[m.id]||{};
        const row=document.createElement('div');
        row.style.cssText='background:var(--surf2);border-radius:14px;padding:14px;margin-bottom:8px';
        // Date + delete
        const top=document.createElement('div');
        top.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:10px';
        top.innerHTML=`<span style="font-size:12px;color:var(--muted)">${m.date}${m.isAdjustment?` <span style="font-size:9px;background:rgba(201,168,76,.15);color:var(--gold);border-radius:6px;padding:1px 6px;margin-left:4px">${t('adjustValues')||'adj'}</span>`:''}</span>`;
        const del=document.createElement('button');
        del.style.cssText='background:none;border:none;color:var(--red);font-size:20px;padding:0 2px';
        del.textContent='×';
        del.onclick=()=>{
          const idx=S.accounts.findIndex(a=>a.id===acc.id);
          S.accounts[idx].mutations=S.accounts[idx].mutations.filter(x=>x.id!==m.id);
          S.editAcc=S.accounts[idx];persist();render();
        };
        top.appendChild(del);
        row.appendChild(top);
        // Values
        const vals=document.createElement('div');
        vals.style.cssText='display:flex;gap:12px;flex-wrap:wrap';
        if(m.inleg!==0) vals.innerHTML+=`<div>
          <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">${t('mutLabelInleg')}</div>
          <div style="color:${m.inleg>0?color:'var(--red)'};font-size:15px">${m.inleg>0?'+':'-'}${fmtC(Math.abs(parseFloat(m.inleg)),acc.currency||'EUR',2)}</div>
          ${tot.bal!==undefined?`<div style="font-size:10px;color:var(--muted)">→ ${fmtC(tot.bal,acc.currency||'EUR',2)}</div>`:''}
        </div>`;
        if(!isSavings&&m.dividend!==0) vals.innerHTML+=`<div>
          <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">${t('mutLabelDiv')}</div>
          <div style="color:${m.dividend>0?'var(--grn)':'var(--red)'};font-size:15px">${m.dividend>0?'+':'-'}${fmtC(Math.abs(parseFloat(m.dividend)),acc.currency||'EUR',2)}</div>
          ${tot.div!==undefined?`<div style="font-size:10px;color:var(--muted)">→ ${fmtC(tot.div,acc.currency||'EUR',2)}/jr</div>`:''}
        </div>`;
        row.appendChild(vals);
        el.appendChild(row);
      });
    }

    const closeBtn=document.createElement('button');
    closeBtn.className='btn-sec';
    closeBtn.style.cssText='width:100%;margin-top:8px';
    closeBtn.textContent=t('cancel');
    closeBtn.onclick=()=>{S.modal=null;S.form={};S.editAcc=null;render();};
    el.appendChild(closeBtn);
    return el;
  }

  // ── ADD MUTATION form ──
  const hd2=document.createElement('div');
  hd2.style.cssText='margin-bottom:20px';
  hd2.innerHTML=`<div class="modal-title" style="margin-bottom:4px">${t('addMutation')}</div>
    <div style="font-size:12px;color:var(--muted)">${acc.name}</div>`;
  el.appendChild(hd2);

  // Context: show current totals
  const ctx=document.createElement('div');
  ctx.style.cssText='background:var(--surf2);border-radius:12px;padding:12px 14px;margin-bottom:18px;display:flex;gap:16px;font-size:12px';
  ctx.innerHTML=`<div><span style="color:var(--muted)">${t('balance')}:</span> <span style="color:${color}">${fmtE(accBal(acc),2)}</span></div>
    ${!isSavings?`<div><span style="color:var(--muted)">${t('dividend').split(' ')[0]}/jr:</span> <span style="color:var(--grn)">${fmtE(accDiv(acc),2)}</span></div>`:''}`;
  el.appendChild(ctx);

  // Type toggle (increase / decrease)
  const typeToggle=document.createElement('div');
  typeToggle.style.cssText='display:flex;background:var(--hover);border-radius:12px;padding:3px;margin-bottom:18px;gap:3px';
  const isDecrease=S.form.mutDir==='decrease';
  ['increase','decrease'].forEach(dir=>{
    const btn=document.createElement('button');
    btn.style.cssText=`flex:1;padding:9px;border-radius:9px;font-family:var(--mono);font-size:12px;border:none;cursor:pointer;transition:all .2s;`
      +(S.form.mutDir===dir||(!S.form.mutDir&&dir==='increase')
        ?`background:${dir==='increase'?'rgba(78,203,141,.2)':'rgba(255,107,107,.2)'};color:${dir==='increase'?'var(--grn)':'var(--red)'};`
        :'background:none;color:var(--muted);');
    btn.textContent=(dir==='increase'?'↑ ':'↓ ')+t(dir);
    btn.onclick=()=>{S.form={...S.form,mutDir:dir};render();};
    typeToggle.appendChild(btn);
  });
  el.appendChild(typeToggle);

  const form=document.createElement('div');
  form.innerHTML=`
    <div class="field"><label>${t('mutationDate')}</label><input id="mDt" type="date" value="${S.form.mdate||new Date().toISOString().split('T')[0]}"></div>
    <div class="field"><label>${t('inleg')}</label><input id="mIn" type="number" inputmode="decimal" placeholder="0" value="${S.form.minleg||''}"></div>
    ${!isSavings?`<div class="field"><label>${t('extraDiv')}</label><input id="mDv" type="number" inputmode="decimal" placeholder="0" value="${S.form.mdiv||''}"></div>`:''}
    ${S.form.err?`<div class="err-msg">${S.form.err}</div>`:''}
    <div class="btn-row">
      <button class="btn-sec" id="mCan">${t('cancel')}</button>
      <button class="btn-primary" id="mSav">${t('save')}</button>
    </div>
  `;
  el.appendChild(form);

  form.querySelector('#mCan').onclick=()=>{S.modal='viewMutations';S.form={};render();};
  form.querySelector('#mSav').onclick=()=>{
    const raw=parseFloat(form.querySelector('#mIn').value)||0;
    const dir=S.form.mutDir||'increase';
    const sign=dir==='decrease'?-1:1;
    const inleg=raw*sign;
    const rawDiv=isSavings?0:(parseFloat(form.querySelector('#mDv')?.value)||0);
    const dividend=rawDiv*sign;
    const date=form.querySelector('#mDt').value;
    if(raw===0&&rawDiv===0){S.form={...S.form,err:t('mutErrFill')};render();return;}
    const idx=S.accounts.findIndex(a=>a.id===acc.id);
    if(!S.accounts[idx].mutations)S.accounts[idx].mutations=[];
    S.accounts[idx].mutations.push({id:Date.now().toString(),date,inleg,dividend});
    S.accounts[idx].mutations.sort((a,b)=>a.date.localeCompare(b.date));
    S.editAcc=S.accounts[idx];
    S.modal='viewMutations';S.form={};
    persist();render();
  };
  return el;
}

      expand.className='acc-expand';
      expand.innerHTML=`<div class="acc-stats">
        <div class="acc-stat"><div class="acc-stat-label">${t('perYear')}</div><div class="acc-stat-val" style="color:${color}">${fmtC(yr,a.currency||'EUR',2)}</div></div>
        <div class="acc-stat"><div class="acc-stat-label">${t('perDay')}</div><div class="acc-stat-val" style="color:${color}">${fmtC(yr/365.25,a.currency||'EUR',4)}</div></div>
        <div class="acc-stat"><div class="acc-stat-label">${a.incomeMode==='%'?t('returnPct'):t('annualIncome')}</div><div class="acc-stat-val" style="color:${color}">${a.incomeMode==='%'?(a.annualReturn||0)+'%':fmtC(yr,a.currency||'EUR',2)}</div></div>
      </div>`;

      // ── Actieknoppen ──
      const actRow=document.createElement('div');
      actRow.className='acc-act-row';

      if(a.category==='stocks'){
        const pfBtn=document.createElement('button');
        pfBtn.style.cssText=`color:${color}`;
        pfBtn.innerHTML=`<span>📊</span>${t('portfolio')}`;
        pfBtn.onclick=(e)=>{e.stopPropagation();S.viewPortfolio=a;render();};
        actRow.appendChild(pfBtn);
      }

      const mutBtn=document.createElement('button');
      mutBtn.style.cssText=`color:${color}`;
      mutBtn.innerHTML=`<span>+</span>${t('mutations')}`;
      mutBtn.onclick=(e)=>{e.stopPropagation();S.editAcc=a;S.modal='viewAssetMutations';S.form={};render();};
      actRow.appendChild(mutBtn);

      const editBtn=document.createElement('button');
      editBtn.style.cssText='color:var(--muted)';
      editBtn.innerHTML=`<span>⚙</span>${t('editAsset')}`;
      editBtn.onclick=(e)=>{e.stopPropagation();S.editAsset=a;S.modal='editAsset';S.form={...a};render();};
      actRow.appendChild(editBtn);

      expand.appendChild(actRow);

      // ── Toggle ──
      row.onclick=()=>{
        const chevron=row.querySelector('.acc-chevron');
        const isOpen=expand.classList.contains('open');
        list.querySelectorAll('.acc-expand.open').forEach(e=>e.classList.remove('open'));
        list.querySelectorAll('.acc-chevron.open').forEach(c=>c.classList.remove('open'));
        if(!isOpen){expand.classList.add('open');chevron.classList.add('open');}
      };

      item.appendChild(row);
      item.appendChild(expand);
      list.appendChild(item);
    });
    const pw=document.createElement('div');pw.className='powered';pw.textContent=t('powered');list.appendChild(pw);el.appendChild(list);
  }
  const fab=document.createElement('button');fab.className='fab';fab.textContent='+';
  fab.onclick=()=>{S.modal='addAsset';S.form={category:'stocks',incomeMode:'€',color:ASSET_CATS.stocks.dc};render();};
  el.appendChild(fab);return el;
}

// ═══════════════════════════════════
//  TRANSFER FORM
// ═══════════════════════════════════
function buildTransferForm(){
  const from=S.editAcc;
  const el=document.createElement('div');
  const others=S.accounts.filter(a=>a.id!==from.id);
  el.innerHTML=`<div class="modal-title">${t('transfer')}</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:18px">${t('transferFrom')}: <strong style="color:var(--txt)">${from.name}</strong> (${fmtC(accBal(from),from.currency||'EUR',2)})</div>
    <div class="field"><label>${t('transferTo')}</label>
      <select id="trTo" style="width:100%;background:var(--surf2);border:1px solid var(--brd);border-radius:12px;padding:12px;color:var(--txt);font-family:var(--mono);font-size:12px">
        ${others.map(a=>`<option value="${a.id}">${a.name} (${fmtC(accBal(a),a.currency||'EUR',2)})</option>`).join('')}
      </select>
    </div>
    <div class="field"><label>${t('transferAmount')}</label><input id="trAmt" type="number" inputmode="decimal" placeholder="0" value=""></div>
    ${S.form.err?`<div class="err-msg">${S.form.err}</div>`:''}
    <div class="btn-row">
      <button class="btn-sec" id="trCan">${t('cancel')}</button>
      <button class="btn-primary" id="trSav">${t('transferConfirm')}</button>
    </div>`;
  setTimeout(()=>{
    el.querySelector('#trCan').onclick=()=>{S.modal=null;S.form={};S.editAcc=null;render();};
    el.querySelector('#trSav').onclick=()=>{
      const amt=parseFloat(el.querySelector('#trAmt').value)||0;
      const toId=el.querySelector('#trTo').value;
      if(amt<=0){S.form={...S.form,err:'Enter a valid amount'};render();return;}
      const fi=S.accounts.findIndex(a=>a.id===from.id);
      const ti=S.accounts.findIndex(a=>a.id===toId);
      if(fi<0||ti<0)return;
      // Add decrease mutation to source
      if(!S.accounts[fi].mutations)S.accounts[fi].mutations=[];
      S.accounts[fi].mutations.push({id:Date.now().toString(),date:new Date().toISOString().split('T')[0],inleg:-amt,dividend:0});
      // Add increase mutation to target
      if(!S.accounts[ti].mutations)S.accounts[ti].mutations=[];
      S.accounts[ti].mutations.push({id:(Date.now()+1).toString(),date:new Date().toISOString().split('T')[0],inleg:amt,dividend:0});
      // Add transaction
      S.transactions.push({id:(Date.now()+2).toString(),date:new Date().toISOString().split('T')[0],type:'transfer',description:`${from.name} → ${S.accounts[ti].name}`,amount:amt});
      S.modal=null;S.form={};S.editAcc=null;persist();render();
    };
  },10);
  return el;
}

    <div id="acpSlot"></div>
    ${S.form.err?`<div class="err-msg">${S.form.err}</div>`:''}
    <div class="btn-row">
      <button class="btn-sec" id="aCanBtn">${t('cancel')}</button>
      ${isEdit?`<button class="btn-sec btn-danger" id="aDelBtn">${t('delete')}</button>`:''}
      <button class="btn-primary" id="aSavBtn">${t('save')}</button>
    </div>`;
  // Color picker
  const cpSlot=el.querySelector('#acpSlot');
  if(cpSlot){
    const cpField=document.createElement('div');cpField.className='field';cpField.innerHTML='<label>'+t('color')+'</label>';
    const cpRow=document.createElement('div');cpRow.className='color-pick-row';
    COLOR_PAL.forEach(c=>{const d=document.createElement('div');d.className='color-dot'+((S.form.color||(ASSET_CATS[cat]||{}).dc||'#4ecb8d')===c?' active':'');d.style.background=c;d.onclick=()=>{S.form.color=c;render();};cpRow.appendChild(d);});
    cpField.appendChild(cpRow);cpSlot.appendChild(cpField);
  }
  setTimeout(()=>{
    function snap(){S.form.name=el.querySelector('#aN')?.value;S.form.value=el.querySelector('#aVal')?.value;S.form.annualReturn=el.querySelector('#aRet')?.value;S.form.annualIncome=el.querySelector('#aInc')?.value;}
    el.querySelectorAll('#catBtns .type-btn').forEach(b=>{b.onclick=()=>{snap();S.form.category=b.dataset.c;S.form.color=(ASSET_CATS[b.dataset.c]||{}).dc;render();};});
    el.querySelectorAll('#modeBtns .type-btn').forEach(b=>{b.onclick=()=>{snap();S.form.incomeMode=b.dataset.m;render();};});
    el.querySelector('#aCanBtn').onclick=()=>{S.modal=null;S.form={};S.editAsset=null;render();};
    if(isEdit&&el.querySelector('#aDelBtn'))el.querySelector('#aDelBtn').onclick=()=>{if(confirm(t('delAssetConfirm'))){S.assets=S.assets.filter(a=>a.id!==S.editAsset.id);S.modal=null;S.form={};S.editAsset=null;persist();render();}};
    el.querySelector('#aSavBtn').onclick=()=>{
      const name=el.querySelector('#aN')?.value?.trim();
      if(!name){S.form.err=t('nameReq');render();return;}
      const obj={name,category:cat,incomeMode:mode,color:S.form.color||(ASSET_CATS[cat]||{}).dc||'#4ecb8d',currency:'EUR'};
      if(cat!=='stocks')obj.value=parseFloat(el.querySelector('#aVal')?.value)||0;
      else obj.positions=isEdit&&S.editAsset.positions?S.editAsset.positions:[];
      if(mode==='%')obj.annualReturn=parseFloat(el.querySelector('#aRet')?.value)||0;
      else obj.annualIncome=parseFloat(el.querySelector('#aInc')?.value)||0;
      if(isEdit){const i=S.assets.findIndex(a=>a.id===S.editAsset.id);S.assets[i]={...S.assets[i],...obj};}

      S.modal=null;S.form={};S.editAsset=null;persist();render();
    };
  },10);
  return el;
}

// ═══════════════════════════════════
//  ASSET MUTATION MODAL
// ═══════════════════════════════════
function buildAssetMutationModal(){
  const acc=S.editAcc;const el=document.createElement('div');
  if(S.modal==='viewAssetMutations'){
    const muts=(acc.assetMutations||[]).slice().reverse();
    el.innerHTML=`<div class="modal-title">${t('mutationHistory')}</div><div style="font-size:12px;color:var(--muted);margin-bottom:14px">${acc.name}</div>`;
    const addBtn=document.createElement('button');addBtn.className='btn-primary';addBtn.style.cssText='width:100%;margin-bottom:14px';
    addBtn.textContent=t('addMutation');addBtn.onclick=()=>{S.modal='addAssetMutation';S.form={mdate:new Date().toISOString().split('T')[0]};render();};el.appendChild(addBtn);
    if(muts.length===0){el.innerHTML+='<div style="color:var(--muted);text-align:center;padding:12px">'+t('noMutations')+'</div>';}
    else muts.forEach(m=>{
      const row=document.createElement('div');row.style.cssText='background:var(--surf2);border-radius:14px;padding:14px;margin-bottom:8px';
      row.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:var(--muted)">${m.date}</span></div><div style="color:${m.amount>0?'var(--grn)':'var(--red)'};font-size:15px;margin-top:6px">${m.amount>0?'+':''}${fmtC(m.amount,'EUR',2)}</div>`;
      const del=document.createElement('button');del.style.cssText='background:none;border:none;color:var(--red);font-size:18px;float:right;margin-top:-30px';del.textContent='×';
      del.onclick=()=>{const i=S.assets.findIndex(a=>a.id===acc.id);S.assets[i].assetMutations=S.assets[i].assetMutations.filter(x=>x.id!==m.id);S.editAcc=S.assets[i];persist();render();};
      row.appendChild(del);el.appendChild(row);
    });
    const closeBtn=document.createElement('button');closeBtn.className='btn-sec';closeBtn.style.cssText='width:100%;margin-top:8px';
    closeBtn.textContent=t('cancel');closeBtn.onclick=()=>{S.modal=null;S.form={};S.editAcc=null;render();};el.appendChild(closeBtn);
    return el;
  }
  // Add mutation
  el.innerHTML=`<div class="modal-title">${t('addMutation')}</div><div style="font-size:12px;color:var(--muted);margin-bottom:14px">${acc.name}</div>
    <div class="field"><label>${t('mutationDate')}</label><input id="amDt" type="date" value="${S.form.mdate||new Date().toISOString().split('T')[0]}"></div>
    <div class="field"><label>${t('mutLabelInleg')}</label><input id="amAmt" type="number" inputmode="decimal" value=""></div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button class="type-btn${(S.form.mutDir||'increase')==='increase'?' active':''}" id="amInc" style="flex:1">${t('increase')}</button>
      <button class="type-btn${S.form.mutDir==='decrease'?' active':''}" id="amDec" style="flex:1">${t('decrease')}</button>
    </div>
    ${S.form.err?`<div class="err-msg">${S.form.err}</div>`:''}
    <div class="btn-row"><button class="btn-sec" id="amCan">${t('cancel')}</button><button class="btn-primary" id="amSav">${t('save')}</button></div>`;
  setTimeout(()=>{
    el.querySelector('#amInc').onclick=()=>{S.form.mutDir='increase';render();};
    el.querySelector('#amDec').onclick=()=>{S.form.mutDir='decrease';render();};
    el.querySelector('#amCan').onclick=()=>{S.modal='viewAssetMutations';S.form={};render();};
    el.querySelector('#amSav').onclick=()=>{
      const raw=parseFloat(el.querySelector('#amAmt').value)||0;
      if(raw===0){S.form.err=t('mutErrFill');render();return;}
      const sign=(S.form.mutDir||'increase')==='decrease'?-1:1;
      const i=S.assets.findIndex(a=>a.id===acc.id);
      if(!S.assets[i].assetMutations)S.assets[i].assetMutations=[];
      S.assets[i].assetMutations.push({id:Date.now().toString(),date:el.querySelector('#amDt').value,amount:raw*sign});
      S.editAcc=S.assets[i];S.modal='viewAssetMutations';S.form={};persist();render();
    };
  },10);
  return el;
}

    const on=!!S.tickerSources[src.key];
    const row=document.createElement('div');row.className='ticker-toggle';
    row.innerHTML=`<div class="ticker-toggle-left"><div class="ticker-toggle-dot" style="background:${src.color}"></div>${src.label}</div>`;
    const sw=document.createElement('div');sw.className='toggle-switch'+(on?' on':'');
    sw.innerHTML='<div class="toggle-knob"></div>';
    sw.onclick=()=>{S.tickerSources[src.key]=!S.tickerSources[src.key];persist();render();};
    row.appendChild(sw);el.appendChild(row);
  });
  const closeBtn=document.createElement('button');closeBtn.className='btn-primary';closeBtn.style.cssText='width:100%;margin-top:14px';
  closeBtn.textContent=t('save');closeBtn.onclick=()=>{S.modal=null;render();};el.appendChild(closeBtn);
  return el;
}

// ═══════════════════════════════════
//  SETTINGS TAB
// ═══════════════════════════════════
function buildSettingsTab(){
  const el=document.createElement('div');el.className='settings-page fade';
  const pg=S.settingsPage,u=auth.currentUser;
  function sRow(icon,label,rightHTML,onClick){
    const row=document.createElement('button');row.style.cssText='display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:none;border-bottom:1px solid var(--brd);padding:16px 4px;cursor:pointer;color:var(--txt)';
    row.innerHTML=`<div style="display:flex;align-items:center;gap:12px"><span style="font-size:20px;width:32px;text-align:center">${icon}</span><span style="font-size:13px">${label}</span></div><div style="display:flex;align-items:center;gap:8px">${rightHTML}<span style="font-size:14px;color:var(--muted)">›</span></div>`;
    row.onclick=onClick;return row;
  }
  if(pg==='lang'){
    el.innerHTML=`<div class="settings-header"><button class="settings-back" id="sB">←</button><div class="settings-title">${t('chooseLanguage')}</div></div>`;
    const list=document.createElement('div');list.className='settings-list';
    Object.entries(LANGS).forEach(([code,l])=>{
      const opt=document.createElement('button');opt.className='settings-option'+(S.lang===code?' active':'');
      opt.innerHTML=`<span class="settings-option-flag">${l.flag}</span><div class="settings-option-text"><div class="settings-option-name">${l.name}</div></div><span class="settings-option-check">✓</span>`;
      opt.onclick=()=>{S.lang=code;persist();render();};list.appendChild(opt);
    });
    el.appendChild(list);setTimeout(()=>{el.querySelector('#sB').onclick=()=>{S.settingsPage=null;render();};},10);return el;
  }
  if(pg==='currency'){
    el.innerHTML=`<div class="settings-header"><button class="settings-back" id="sB">←</button><div class="settings-title">${t('chooseCurrency')}</div></div>`;
    const list=document.createElement('div');list.className='settings-list';
    DISP_CURRENCIES.forEach(code=>{
      const c=CURRENCIES[code];const opt=document.createElement('button');opt.className='settings-option'+(S.displayCurrency===code?' active':'');
      opt.innerHTML=`<span class="settings-option-flag">${c.symbol}</span><div class="settings-option-text"><div class="settings-option-name">${c.name}</div><div class="settings-option-sub">${code}</div></div><span class="settings-option-check">✓</span>`;
      opt.onclick=()=>{S.displayCurrency=code;persist();render();};list.appendChild(opt);
    });
    el.appendChild(list);setTimeout(()=>{el.querySelector('#sB').onclick=()=>{S.settingsPage=null;render();};},10);return el;
  }
  if(pg==='theme'){
    el.innerHTML=`<div class="settings-header"><button class="settings-back" id="sB">←</button><div class="settings-title">${t('chooseTheme')}</div></div>`;
    const list=document.createElement('div');list.className='settings-list';
    [['dark','🌙',t('themeDark'),''],['light','☀️',t('themeLight'),''],['auto','🔄',t('themeAuto'),t('themeAutoDesc')]].forEach(([k,ic,nm,sub])=>{
      const opt=document.createElement('button');opt.className='settings-option'+(S.theme===k?' active':'');
      opt.innerHTML=`<span class="settings-option-flag">${ic}</span><div class="settings-option-text"><div class="settings-option-name">${nm}</div>${sub?'<div class="settings-option-sub">'+sub+'</div>':''}</div><span class="settings-option-check">✓</span>`;
      opt.onclick=()=>{S.theme=k;applyTheme();persist();render();};list.appendChild(opt);
    });
    el.appendChild(list);setTimeout(()=>{el.querySelector('#sB').onclick=()=>{S.settingsPage=null;render();};},10);return el;
  }
  // Main settings page
  el.innerHTML=`<div class="settings-header"><button class="settings-back" id="sMain">←</button><div class="settings-title">${t('settings')}</div></div>`;
  setTimeout(()=>{
    const backBtn=document.getElementById('sMain');
    if(backBtn)backBtn.onclick=()=>{S.showSettings=false;S.settingsPage=null;render();};
  },10);
  const prefSec=document.createElement('div');prefSec.className='settings-group';prefSec.innerHTML=`<div class="settings-group-label">${t('preferences')}</div>`;
  const prefBox=document.createElement('div');prefBox.style.cssText='background:var(--surf);border:1px solid var(--brd);border-radius:16px;padding:0 12px;overflow:hidden';
  const lg=LANGS[S.lang],cur=CURRENCIES[S.displayCurrency]||CURRENCIES.EUR;
  prefBox.appendChild(sRow('🌐',t('settingsLang'),`<span style="font-size:12px;color:var(--muted)">${lg.flag} ${lg.name}</span>`,()=>{S.settingsPage='lang';render();}));
  prefBox.appendChild(sRow('💱',t('settingsCurrency'),`<span style="font-size:12px;color:var(--muted)">${cur.symbol} ${cur.name}</span>`,()=>{S.settingsPage='currency';render();}));
  const thLabel=S.theme==='auto'?`🔄 ${t('themeAuto')}`:S.theme==='light'?`☀️ ${t('themeLight')}`:`🌙 ${t('themeDark')}`;
  const tr=sRow('🎨',t('settingsTheme'),`<span style="font-size:12px;color:var(--muted)">${thLabel}</span>`,()=>{S.settingsPage='theme';render();});
  tr.style.borderBottom='none';prefBox.appendChild(tr);
  prefSec.appendChild(prefBox);el.appendChild(prefSec);
  // Account section
  const accSec=document.createElement('div');accSec.className='settings-group';accSec.innerHTML=`<div class="settings-group-label">${t('settingsAccount')}</div>`;
  const accBox=document.createElement('div');accBox.style.cssText='background:var(--surf);border:1px solid var(--brd);border-radius:16px;padding:14px 16px';
  if(u){
    accBox.innerHTML=`<div style="font-size:13px;color:var(--txt);margin-bottom:8px">${t('loggedInAs')}: ${u.email}</div>`;
    const lb=document.createElement('button');lb.className='btn-sec';lb.style.cssText='width:100%';lb.textContent=t('logout');
    lb.onclick=()=>{auth.signOut();localStorage.removeItem('pi_skipped_auth');render();};accBox.appendChild(lb);
  } else {
    accBox.innerHTML=`<div style="font-size:12px;color:var(--muted);margin-bottom:10px">${t('skipLogin')}</div>`;
    const lb=document.createElement('button');lb.className='btn-primary';lb.style.cssText='width:100%';lb.textContent=t('signIn');
    lb.onclick=()=>{S.authScreen='login';render();};accBox.appendChild(lb);
  }
  accSec.appendChild(accBox);el.appendChild(accSec);
  const pw=document.createElement('div');pw.className='powered';pw.textContent=t('powered');el.appendChild(pw);
  return el;
}

// ═══════════════════════════════════
//  AUTH SCREEN
// ═══════════════════════════════════
function buildAuthScreen(){
  const el=document.createElement('div');el.className='auth-wrap';
  const isLogin=S.authScreen==='login';
  el.innerHTML=`<div class="auth-logo">💰</div><div class="auth-title">${t('appName')}</div><div class="auth-sub">${t('loginSubtitle')}</div>
    <div class="auth-form">
      ${S.authErr?`<div class="auth-err">${S.authErr}</div>`:''}
      ${S.authSuccess?`<div class="auth-success">${S.authSuccess}</div>`:''}
      <div class="auth-field"><label>${t('email')}</label><input id="aEmail" type="email" placeholder="you@example.com"></div>
      <div class="auth-field"><label>${t('password')}</label><input id="aPass" type="password" placeholder="••••••"></div>
      ${!isLogin?`<div class="auth-field"><label>${t('confirmPassword')}</label><input id="aPass2" type="password" placeholder="••••••"></div>`:''}
      <button class="auth-btn" id="aSubmit">${isLogin?t('signIn'):t('signUp')}</button>
      ${isLogin?`<div class="auth-forgot"><button id="aForgot">${t('forgotPassword')}</button></div>`:''}
      <div class="auth-switch">${isLogin?t('noAccount'):t('haveAccount')} <button id="aToggle">${isLogin?t('signUp'):t('signIn')}</button></div>
      <div class="auth-divider">${t('or')}</div>
      <button class="auth-skip" id="aSkip">${t('skipLogin')}</button>
    </div>`;
  setTimeout(()=>{
    el.querySelector('#aToggle').onclick=()=>{S.authScreen=isLogin?'register':'login';S.authErr='';S.authSuccess='';render();};
    el.querySelector('#aSkip').onclick=()=>{localStorage.setItem('pi_skipped_auth','1');S.authScreen='app';render();};
    if(isLogin&&el.querySelector('#aForgot'))el.querySelector('#aForgot').onclick=async()=>{
      const email=el.querySelector('#aEmail').value;if(!email){S.authErr=t('enterEmail');render();return;}
      try{await auth.sendPasswordResetEmail(email);S.authSuccess=t('resetSent');S.authErr='';render();}catch(e){S.authErr=e.message;render();}
    };
    el.querySelector('#aSubmit').onclick=async()=>{
      const email=el.querySelector('#aEmail').value,pass=el.querySelector('#aPass').value;
      if(!email||!pass){S.authErr=t('fillFields');render();return;}
      if(!isLogin){
        const pass2=el.querySelector('#aPass2')?.value;
        if(pass!==pass2){S.authErr=t('passwordMismatch');render();return;}
        if(pass.length<6){S.authErr=t('passwordTooShort');render();return;}
      }
      S.authLoading=true;render();
      try{
        if(isLogin)await auth.signInWithEmailAndPassword(email,pass);
        else await auth.createUserWithEmailAndPassword(email,pass);
        S.authScreen='app';S.authErr='';
      }catch(e){S.authErr=e.message;}
      S.authLoading=false;render();
    };
  },10);
  return el;
}

// ── START ──
document.addEventListener('DOMContentLoaded',()=>{
  applyTheme();
  auth.onAuthStateChanged(user=>{
    if(user){
      S.authUser=user;
      S.authScreen='app';
      loadFromCloud().then(()=>{render();});
    } else if(localStorage.getItem('pi_skipped_auth')){
      S.authScreen='app';
      render();
    } else {
      S.authScreen='login';
      render();
    }
  });
  fetchRates();
  initAdMob();
});
</script>
